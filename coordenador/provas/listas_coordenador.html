<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Listas de Assinatura | SME FMM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <script src="../../assets/js/supabase_client.js"></script>
    <script src="../../sidebar.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        fmm: {
                            dark: '#003c5b',
                            blue: '#00638f',
                            green: '#80a51b',
                            lime: '#c8d400',
                            bg: '#f8fafc'
                        }
                    }
                }
            }
        }
    </script>

    <style>
        /* Estilos de tela (UI do Sistema) */
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; overflow: hidden; }
        .sidebar-transition { transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }

        .exam-row-card { transition: all 0.2s; cursor: pointer; }
        .exam-row-card:hover { border-color: #c8d400; background-color: #f8fafc; }
        .checkbox-custom:checked + div { border-color: #00638f; background-color: #f0f9ff; }

        /* =========================================================================
           ESTILOS DE IMPRESSÃO (TEMPLATE EXATO SOLICITADO)
           ========================================================================= */
        :root {
            --borda: #000000;
            --amarelo: #c8d400;
            --texto: #000000;
        }

        .sheet {
            width: 100%;
            max-width: 794px; /* A4 em pixels */
            margin: 0 auto;
            background: #fff;
            padding: 0;
            color: var(--texto);
            font-family: Arial, Helvetica, sans-serif;
            page-break-after: always;
        }
        .sheet:last-child { page-break-after: auto; }

        /* Tabela Estrutural */
        table.layout {
            width: 100%;
            border-collapse: collapse;
            table-layout: fixed;
            font-size: 11px;
            border: 2px solid var(--borda);
        }

        /* Estilos Específicos das Células */
        .s0 { border: 1px solid var(--borda); border-bottom: 2px solid var(--borda); background-color: #ffffff; text-align: center; vertical-align: middle; }
        .s1 { border: 1px solid var(--borda); border-bottom: 2px solid var(--borda); background-color: #ffffff; text-align: center; font-weight: bold; font-size: 12pt; vertical-align: middle; text-transform: uppercase; padding: 2px; }
        .s2 { border: 1px solid var(--borda); border-bottom: 2px solid var(--borda); background-color: var(--amarelo); text-align: center; font-weight: bold; font-size: 8pt; vertical-align: middle; text-transform: uppercase; padding: 4px 2px; }
        
        .s3 { border: 1px solid var(--borda); background-color: #ffffff; text-align: center; font-size: 8pt; vertical-align: middle; font-weight: bold; padding: 1px; }
        .s4 { border: 1px solid var(--borda); background-color: #ffffff; text-align: left; font-size: 8pt; vertical-align: middle; text-transform: uppercase; padding: 1px 4px; }
        .s-empty { border: 1px solid var(--borda); background-color: #ffffff; vertical-align: middle; }

        /* Altura base para tela */
        .r1, .r2, .r3, .r4 { height: 20px; }
        .r5 { height: 24px; }
        .data-row { height: 18px; } 

        /* Logo */
        .logo-cell img {
            width: 90%;
            max-height: 60px;
            object-fit: contain;
            display: block;
            margin: 0 auto;
        }

        /* =========================================================================
           COMPORTAMENTO REAL DE IMPRESSÃO DO NAVEGADOR
           ========================================================================= */
        @media print {
            @page { size: A4 portrait; margin: 8mm; }
            
            body, html { 
                padding: 0 !important; 
                margin: 0 !important; 
                background: #fff !important; 
            }
            
            body > *:not(main) { display: none !important; }
            main > *:not(#printArea) { display: none !important; }
            
            .bottom-nav, #mobile-menu-hub, #toast, #sidebar-container, header, aside, button, #uiContainer { 
                display: none !important; 
                opacity: 0 !important; 
                visibility: hidden !important; 
            }
            
            main { margin: 0 !important; padding: 0 !important; width: 100% !important; overflow: visible !important; background: transparent !important; }
            #printArea { display: block !important; width: 100%; }

            .sheet { 
                width: 100% !important; 
                max-width: none !important; 
                box-shadow: none !important; 
                padding: 0 !important; 
                margin: 0 !important; 
                page-break-after: always; 
                page-break-inside: avoid;
                break-inside: avoid;
            }
            
            .sheet .s1 { font-size: 11pt !important; padding: 2px !important; }
            .sheet .s2 { font-size: 7.5pt !important; padding: 2px !important; -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
            .sheet .s3 { font-size: 7.5pt !important; padding: 1px 2px !important; line-height: 1 !important; }
            
            .sheet .s4 { 
                font-size: 7.5pt !important; 
                padding: 1px 4px !important; 
                line-height: 1 !important; 
                white-space: nowrap !important; 
                overflow: hidden !important; 
                text-overflow: ellipsis !important; 
            }
            
            .sheet .data-row { height: 18px !important; }
            .sheet .data-row td { height: 18px !important; }
            .sheet .r1, .sheet .r2, .sheet .r3, .sheet .r4 { height: 17px !important; }
            .sheet .r5 { height: 22px !important; }

            .logo-cell img { max-height: 55px !important; padding: 2px !important; }
            
            table.layout, table.layout td, table.layout th { border-color: #000 !important; border-width: 1px !important; }
            .s0, .s1, .s2 { border-width: 1px !important; border-style: solid !important; border-color: #000 !important; }
        }
    </style>
</head>
<body class="flex h-screen w-screen overflow-hidden text-left print:block print:h-auto print:overflow-visible">

    <aside id="sidebar-container" class="sidebar-transition w-72 bg-fmm-dark text-white flex-shrink-0 flex flex-col shadow-2xl relative z-20 print:hidden"></aside>

    <main class="flex-1 flex flex-col min-w-0 bg-slate-50 overflow-hidden relative print:block print:h-auto print:overflow-visible print:p-0 print:m-0 print:bg-white text-left">
        
        <!-- HEADER UI DO SISTEMA -->
        <header class="bg-white h-20 border-b flex items-center justify-between px-8 z-30 shadow-sm flex-shrink-0 no-print print:hidden text-left">
            <div class="flex flex-col text-left">
                <h1 class="text-xl font-black text-fmm-dark uppercase tracking-tight leading-none">Listas de Assinatura</h1>
                <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest mt-1">Gerador de Documentos Institucionais</p>
            </div>

            <div class="flex items-center gap-4">
                <select id="filterPeriodo" onchange="loadExams()" class="px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl text-xs font-bold text-slate-600 outline-none focus:ring-2 focus:ring-fmm-blue">
                    <option value="1_TRIMESTRE">1º Trimestre</option>
                    <option value="2_TRIMESTRE">2º Trimestre</option>
                    <option value="3_TRIMESTRE">3º Trimestre</option>
                    <option value="1_BIMESTRE">1º Bimestre</option>
                    <option value="2_BIMESTRE">2º Bimestre</option>
                    <option value="3_BIMESTRE">3º Bimestre</option>
                    <option value="4_BIMESTRE">4º Bimestre</option>
                    <option value="1_SEMESTRE">1º Semestre</option>
                    <option value="2_SEMESTRE">2º Semestre</option>
                </select>
                <button onclick="printBatch()" class="bg-fmm-dark hover:bg-slate-800 text-white px-6 py-2.5 rounded-xl font-black text-[10px] uppercase tracking-widest flex items-center gap-2 shadow-lg transition-all active:scale-95">
                    <i data-lucide="printer" class="w-4 h-4"></i> Imprimir Seleção (PDFZÃO)
                </button>
            </div>
        </header>

        <!-- LISTAGEM PARA SELEÇÃO -->
        <div id="uiContainer" class="flex-1 overflow-y-auto p-8 custom-scrollbar no-print print:hidden">
            <div id="loadingState" class="hidden py-24 flex flex-col items-center justify-center text-slate-300 gap-4 text-center">
                <i data-lucide="loader-2" class="w-12 h-12 animate-spin text-fmm-blue"></i>
                <p class="text-sm font-bold uppercase tracking-widest text-center" id="loadingText">Preparando dados...</p>
            </div>

            <div id="examsGrid" class="max-w-6xl mx-auto space-y-8 pb-20">
                <!-- Injetado via JS -->
            </div>
        </div>

        <!-- ÁREA DE IMPRESSÃO (INVISÍVEL NA TELA, VISÍVEL NO PAPEL) -->
        <div id="printArea" class="hidden print:block w-full bg-white text-black"></div>

    </main>

    <script>
        let examsData = [];
        let turmasData = [];
        let matriculasData = [];
        let userLevels = [];

        async function init() {
            if(window.SidebarComponent) await SidebarComponent.render('sidebar-container');
            
            const { data: { user } } = await window.supabaseClient.auth.getUser();
            if(!user) return window.location.href = "../../index.html";

            // Buscar perfil para filtrar turmas autorizadas
            const { data: profile } = await window.supabaseClient.from('perfis').select('cargo, niveis_acesso').eq('id', user.id).single();
            if (profile) {
                userLevels = (profile.cargo === 'diretor' || profile.cargo === 'coordenador') 
                    ? (profile.niveis_acesso && profile.niveis_acesso.length > 0 ? profile.niveis_acesso : ['EF1', 'EF2', 'EMT']) 
                    : [];
            }
            console.log("DEBUG: Níveis de acesso:", userLevels);

            await loadInitialData();
            await loadExams();
            lucide.createIcons();
        }

        async function fetchTablePaginated(tableName, selectStr, filterFn = null) {
            let allData = [];
            let from = 0;
            const pageSize = 1000;
            const loadingText = document.getElementById('loadingText');

            while(true) {
                if (loadingText) loadingText.innerText = `Baixando ${tableName}: ${allData.length} registros...`;
                
                let query = window.supabaseClient
                    .from(tableName)
                    .select(selectStr)
                    .range(from, from + pageSize - 1);

                if (filterFn) query = filterFn(query);

                const { data, error } = await query;
                
                if (error) {
                    console.error(`ERRO ao buscar ${tableName}:`, error);
                    break;
                }
                
                if (data) allData = allData.concat(data);
                if (!data || data.length < pageSize) break;
                
                from += pageSize;
            }
            return allData;
        }

        async function loadInitialData() {
            document.getElementById('loadingState').classList.remove('hidden');

            // 1. Carregar Turmas (Paginação de Segurança)
            const allTurmas = await fetchTablePaginated('turmas', '*');
            turmasData = allTurmas.filter(t => userLevels.includes(t.nivel));
            console.log(`DEBUG: Turmas Autorizadas: ${turmasData.length}`);

            // 2. Carregar Matrículas (Paginação Crítica - Bypass do limite de 1000)
            const allMats = await fetchTablePaginated('matriculas', 'ra_aluno, id_turma, status, alunos(nome_completo, status)', (q) => {
                return q.eq('ano_letivo', 2026);
            });

            console.log(`DEBUG: Matrículas Raw carregadas: ${allMats.length}`);

            // 3. TASK FIX: Filtro Ultra-Inclusivo
            // Para resolver o vácuo de 109 alunos, agora aceitamos QUALQUER status que não seja 'TRANSFERIDO' ou 'SAIU'.
            matriculasData = allMats.filter(m => {
                const matStatus = (m.status || '').toUpperCase();
                const alStatus = (m.alunos?.status || '').toUpperCase();
                
                // Excluímos apenas quem saiu explicitamente. Todo o resto entra na contagem.
                const isTransferido = matStatus.includes('TRANSF') || alStatus.includes('TRANSF') || 
                                     matStatus.includes('SAIU') || alStatus.includes('SAIU') || 
                                     matStatus.includes('CANCEL') || alStatus.includes('CANCEL');

                return !isTransferido;
            });
            
            console.log(`DEBUG: Alunos Carregados após filtro inclusivo: ${matriculasData.length}`);
            
            // Log de diagnóstico por turma para identificar vazios
            const stats = {};
            matriculasData.forEach(m => stats[m.id_turma] = (stats[m.id_turma] || 0) + 1);
            console.log("DEBUG: Mapa de Ocupação Real (Turmas com Alunos):", stats);
        }

        async function loadExams() {
            const container = document.getElementById('examsGrid');
            const loading = document.getElementById('loadingState');
            const periodo = document.getElementById('filterPeriodo').value;

            container.innerHTML = '';
            loading.classList.remove('hidden');

            try {
                examsData = await fetchTablePaginated('calendario_referencia_provas', '*, disciplinas(nome)', (q) => {
                    return q.eq('periodo_ref', periodo).order('data_prova', { ascending: true });
                });

                if(examsData.length === 0) {
                    container.innerHTML = `
                        <div class="py-24 text-center text-slate-300 flex flex-col items-center gap-4">
                            <i data-lucide="calendar-x" class="w-16 h-16 opacity-20"></i>
                            <p class="font-bold uppercase tracking-widest text-sm">Nenhuma prova cadastrada para este período.</p>
                        </div>`;
                } else {
                    examsData.forEach(exam => {
                        const relevantTurmas = turmasData.filter(t => {
                            // Normalização rigorosa para evitar erro de Case em séries e matriz
                            const normalizedSerie = (t.serie || "").trim().toUpperCase().replace('º', '').replace('ª', '');
                            const isSerieMatch = exam.series.some(s => s.trim().toUpperCase().replace('º', '').replace('ª', '') === normalizedSerie);
                            
                            // Normalização da Matriz para garantir match independente de Maiúsculas
                            const isFundamental = exam.matriz.toUpperCase() === 'FUNDAMENTAL';
                            const isNivelMatch = t.nivel.startsWith(isFundamental ? 'EF' : 'EMT');
                            
                            const count = matriculasData.filter(m => m.id_turma === t.id).length;
                            
                            // Log apenas se a série bater mas os alunos não (Diagnóstico)
                            if (isSerieMatch && isNivelMatch && count === 0) {
                                console.warn(`ALERTA: Turma ${t.nome} deveria ter prova, mas tem 0 alunos carregados.`);
                            }

                            return isSerieMatch && isNivelMatch && count > 0;
                        });

                        if (relevantTurmas.length === 0) return;
                        
                        const examHtml = `
                            <div class="bg-white rounded-[40px] shadow-sm border border-slate-200 overflow-hidden animate-fade">
                                <div class="p-6 border-b border-slate-50 bg-slate-50/30 flex justify-between items-center text-left">
                                    <div class="flex items-center gap-4 text-left">
                                        <div class="w-12 h-12 bg-white rounded-2xl flex items-center justify-center text-fmm-blue shadow-sm border border-slate-100">
                                            <i data-lucide="file-text" class="w-6 h-6"></i>
                                        </div>
                                        <div class="text-left">
                                            <h3 class="text-base font-black text-fmm-dark uppercase tracking-tight leading-none">${exam.disciplinas?.nome || exam.sigla_disciplina}</h3>
                                            <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest mt-0.5">
                                                ${new Date(exam.data_prova + 'T12:00:00').toLocaleDateString('pt-BR')} • PROVA ${exam.tipo_prova} • ${exam.matriz}
                                            </p>
                                        </div>
                                    </div>
                                    <button onclick="toggleAllExamsInGroup('${exam.id}', this)" class="text-[10px] font-black text-fmm-blue uppercase tracking-widest hover:underline px-4 transition-all">Selecionar Todas</button>
                                </div>
                                <div class="p-4 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-3">
                                    ${relevantTurmas.map(t => {
                                        const count = matriculasData.filter(m => m.id_turma === t.id).length;
                                        return `
                                            <label class="relative cursor-pointer group">
                                                <input type="checkbox" class="peer sr-only checkbox-exam-item" data-exam-id="${exam.id}" data-turma-id="${t.id}">
                                                <div class="p-4 bg-white border-2 border-slate-100 rounded-3xl transition-all group-hover:border-fmm-lime/50 peer-checked:border-fmm-blue peer-checked:bg-blue-50/50 text-left">
                                                    <div class="flex justify-between items-start mb-2">
                                                        <span class="text-sm font-black text-fmm-dark uppercase leading-tight">${t.nome}</span>
                                                        <span class="px-2 py-0.5 bg-slate-100 text-slate-400 text-[8px] font-black rounded uppercase">${count} ATIVOS</span>
                                                    </div>
                                                    <button onclick="printSingle('${exam.id}', '${t.id}')" class="w-full mt-2 py-2.5 bg-white border border-slate-200 text-slate-500 rounded-xl text-[9px] font-black uppercase tracking-widest hover:bg-fmm-blue hover:text-white hover:border-fmm-blue transition-all">
                                                        Imprimir Lista
                                                    </button>
                                                </div>
                                            </label>
                                        `;
                                    }).join('')}
                                </div>
                            </div>`;
                        container.innerHTML += examHtml;
                    });
                }
            } catch (err) { console.error("DEBUG CRITICAL:", err); } 
            finally { loading.classList.add('hidden'); lucide.createIcons(); }
        }

        function toggleAllExamsInGroup(examId, btn) {
            const checks = document.querySelectorAll(`.checkbox-exam-item[data-exam-id="${examId}"]`);
            const allChecked = Array.from(checks).every(c => c.checked);
            checks.forEach(c => c.checked = !allChecked);
            btn.innerText = allChecked ? "Selecionar Todas" : "Desmarcar Todas";
        }

        async function printSingle(examId, turmaId) {
            await generatePrintLayout([{ examId, turmaId }]);
            setTimeout(() => window.print(), 500);
        }

        async function printBatch() {
            const selected = Array.from(document.querySelectorAll('.checkbox-exam-item:checked')).map(c => ({
                examId: c.dataset.examId,
                turmaId: c.dataset.turmaId
            }));

            if(selected.length === 0) return alert("Por favor, selecione ao menos uma turma para gerar o lote.");
            
            await generatePrintLayout(selected);
            setTimeout(() => window.print(), 500);
        }

        async function generatePrintLayout(items) {
            const printArea = document.getElementById('printArea');
            printArea.innerHTML = '';

            for (const item of items) {
                const exam = examsData.find(e => e.id === item.examId);
                const turma = turmasData.find(t => t.id === item.turmaId);
                const alunos = matriculasData
                    .filter(m => m.id_turma === item.turmaId)
                    .map(m => ({ ra: m.ra_aluno, nome: m.alunos.nome_completo }))
                    .sort((a, b) => a.nome.localeCompare(b.nome));

                const periodoFormatado = exam.periodo_ref.replace('_', 'º ');
                const dataProva = new Date(exam.data_prova + 'T12:00:00').toLocaleDateString('pt-BR');
                const nomeDisc = exam.disciplinas?.nome || exam.sigla_disciplina;
                const tituloProva = `PROVA ${exam.tipo_prova} | ${periodoFormatado}`;

                const sheet = document.createElement('div');
                sheet.className = 'sheet';

                let tableHtml = `
                    <table class="layout">
                        <colgroup>
                            <col style="width: 4%;" />
                            <col style="width: 8%;" />
                            <col style="width: 32%;" />
                            <col style="width: 6%;" />
                            <col style="width: 25%;" />
                            <col style="width: 25%;" />
                        </colgroup>
                        <thead>
                            <tr class="r1">
                                <td class="logo-cell s0" rowspan="4" colspan="3">
                                    <img alt="FMM" src="../../assets/logo-fmm-color.png" onerror="this.src='https://ui-avatars.com/api/?name=FMM&background=003c5b&color=fff&size=128'" />
                                </td>
                                <td class="s1" rowspan="2" colspan="2">${tituloProva}</td>
                                <td class="s1" rowspan="2">${dataProva}</td>
                            </tr>
                            <tr class="r2"></tr>
                            <tr class="r3">
                                <td class="s1" rowspan="2" colspan="2">${nomeDisc}</td>
                                <td class="s1" rowspan="2">${turma.nome}</td>
                            </tr>
                            <tr class="r4"></tr>
                            <tr class="header-row r5">
                                <th class="s2">Nº</th>
                                <th class="s2">RA</th>
                                <th class="s2">ALUNO</th>
                                <th class="s2">TURMA</th>
                                <th class="s2">ASSINATURA INICIAL</th>
                                <th class="s2">ASSINATURA FINAL</th>
                            </tr>
                        </thead>
                        <tbody>
                `;

                const totalLinhas = Math.max(50, alunos.length);
                
                for (let i = 0; i < totalLinhas; i++) {
                    const aluno = alunos[i];
                    tableHtml += `
                        <tr class="data-row">
                            <td class="s3">${aluno ? (i + 1) : ''}</td>
                            <td class="s3">${aluno ? aluno.ra : ''}</td>
                            <td class="s4" title="${aluno ? aluno.nome : ''}">${aluno ? aluno.nome : ''}</td>
                            <td class="s3">${aluno ? turma.nome : ''}</td>
                            <td class="s-empty"></td>
                            <td class="s-empty"></td>
                        </tr>
                    `;
                }

                tableHtml += `</tbody></table>`;
                sheet.innerHTML = tableHtml;
                printArea.appendChild(sheet);
            }
        }

        window.onload = init;
    </script>
</body>
</html>
