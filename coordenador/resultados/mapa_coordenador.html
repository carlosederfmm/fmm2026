<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Central de Resultados | SME FMM</title>
        
    <!-- Configurações PWA e Mobile -->
    <meta name="theme-color" content="#003c5b">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <!-- Bibliotecas -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

    <!-- Infraestrutura FMM 2026 -->
    <script src="../../assets/js/supabase_client.js"></script>
    <script src="../../sidebar.js"></script>
    <script src="../../assets/js/constants.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        fmm: { 
                            dark: '#003c5b', 
                            blue: '#00638f', 
                            green: '#80a51b', 
                            lime: '#c8d400',
                            bg: '#f8fafc',
                            slate: '#f1f5f9'
                        }
                    },
                    screens: { 'xs': '375px' }
                }
            }
        }
    </script>

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; overflow: hidden; }
        
        .sidebar-transition { transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        
        .sidebar-collapsed .sidebar-text, 
        .sidebar-collapsed .sidebar-category-title, 
        .sidebar-collapsed .chevron-icon { display: none; }
        .sidebar-collapsed .sidebar-item { justify-content: center; padding: 12px 0; }
        .sidebar-collapsed .sidebar-category-header { justify-content: center; padding: 12px 0; }
        .sidebar-collapsed .logo-full { display: none; }
        .sidebar-collapsed .logo-short { display: block; }
        .logo-short { display: none; }
        .sidebar-collapsed .category-content { max-height: none !important; overflow: visible !important; background: transparent !important; }
        .category-content { max-height: 0; overflow: hidden; transition: max-height 0.4s ease; }
        .category-content.open { max-height: 1000px; }
        .rotate-180 { transform: rotate(180deg); }

        .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f5f9; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; border: 2px solid #f1f5f9; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        thead th {
            position: sticky; 
            top: 0; 
            background-color: #0f172a !important; 
            color: #94a3b8 !important; 
            z-index: 30;
            border-bottom: 2px solid #1e293b;
            text-transform: uppercase;
            font-size: 10px;
            font-weight: 800;
            letter-spacing: 0.1em;
            padding: 12px 8px;
            white-space: nowrap;
        }

        .sticky-col-ra {
            position: sticky; left: 0; z-index: 20; 
            border-right: 1px solid #e2e8f0;
            min-width: 60px; background-color: white;
        }
        
        .sticky-col-aluno {
            position: sticky; left: 60px; z-index: 20; 
            border-right: 2px solid #cbd5e1;
            min-width: 220px; max-width: 300px;
            background-color: white;
            box-shadow: 4px 0 10px -4px rgba(0,0,0,0.08);
        }

        thead th.sticky-col-ra, 
        thead th.sticky-col-aluno { 
            z-index: 40; 
            background-color: #0f172a !important; 
            color: #ffffff !important;
            border-right: 1px solid #334155;
        }

        tbody tr:nth-child(even) td.sticky-col-ra,
        tbody tr:nth-child(even) td.sticky-col-aluno { background-color: #f8fafc; }
        tbody tr:hover td.sticky-col-ra,
        tbody tr:hover td.sticky-col-aluno { background-color: #f1f5f9 !important; }

        .modal-backdrop { background-color: rgba(0, 30, 45, 0.9); backdrop-filter: blur(8px); }
        .animate-ui { animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }

        .grade-cell { transition: all 0.2s ease; border-right: 1px solid #f1f5f9; text-align: center; font-weight: 700; }
        .risk-alert { background-color: #fef2f2 !important; color: #ef4444 !important; }

        .search-dropdown { position: absolute; top: 100%; left: 0; right: 0; margin-top: 8px; background: white; border-radius: 24px; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1), 0 10px 10px -5px rgba(0,0,0,0.04); border: 1px solid #f1f5f9; z-index: 100; overflow: hidden; }
        .search-item { padding: 12px 16px; display: flex; align-items: center; gap: 12px; transition: all 0.2s; cursor: pointer; border-bottom: 1px solid #f8fafc; }
        .search-item:hover { background-color: #f0f9ff; transform: translateX(4px); }
        .search-item:last-child { border-bottom: none; }
    </style>
</head>
<body class="h-screen flex overflow-hidden text-slate-800 bg-slate-100">

    <!-- SIDEBAR -->
    <aside id="sidebar-container" class="sidebar-transition w-72 bg-fmm-dark text-white flex-shrink-0 flex flex-col shadow-2xl relative z-50"></aside>

    <!-- ÁREA PRINCIPAL -->
    <main class="flex-1 flex flex-col min-w-0 overflow-hidden">
        
        <!-- HEADER INTEGRADO -->
        <header class="bg-white border-b border-slate-200 z-40 flex-shrink-0">
            <div class="flex flex-col lg:flex-row lg:items-center justify-between p-3 lg:px-6 gap-3">
                
                <!-- Título e Seleção -->
                <div class="flex flex-col sm:flex-row items-start sm:items-center gap-4 flex-1 text-left">
                    <div class="flex flex-col min-w-max text-left">
                        <h1 class="text-lg font-black text-fmm-dark tracking-tight flex items-center gap-2 text-left leading-none">
                            <span class="w-1.5 h-4 bg-fmm-green rounded-full"></span>
                            Central de Resultados
                        </h1>
                    </div>

                    <div class="h-6 w-px bg-slate-200 hidden sm:block"></div>

                    <!-- Controles Principais e Busca Global -->
                    <div class="flex flex-wrap items-center gap-2 w-full text-left">
                        <div class="relative flex-1 sm:flex-none min-w-[140px]">
                            <select id="classSelector" class="w-full bg-slate-50 border border-slate-200 text-slate-700 text-xs font-bold px-3 py-2 rounded-lg focus:ring-2 focus:ring-fmm-blue outline-none cursor-pointer appearance-none" onchange="loadClassMap()">
                                <option value="" disabled selected>Filtrar Turma...</option>
                            </select>
                            <i data-lucide="chevron-down" class="absolute right-3 top-2.5 w-3 h-3 text-slate-400 pointer-events-none"></i>
                        </div>
                        
                        <div class="relative group flex-1 sm:flex-none min-w-[280px]">
                            <i data-lucide="search" class="absolute left-4 top-2.5 w-3.5 h-3.5 text-slate-400 group-focus-within:text-fmm-blue transition-colors"></i>
                            <input type="text" id="globalSearchInput" oninput="handleGlobalSearch(this.value)" placeholder="Pesquisar boletim individual..." class="w-full pl-10 pr-4 py-2 bg-slate-50 border border-slate-200 text-xs font-bold rounded-xl outline-none focus:ring-4 focus:ring-fmm-blue/5 focus:border-fmm-blue transition-all">
                            
                            <div id="searchDropdown" class="search-dropdown hidden animate-fade-in-up">
                                <div id="searchResults" class="max-h-80 overflow-y-auto custom-scrollbar p-2"></div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Botões de Ação e Períodos -->
                <div class="flex flex-col sm:flex-row items-stretch sm:items-center gap-2 shrink-0">
                    <button id="btnRiskFilter" onclick="toggleRiskFilter()" class="flex justify-center items-center gap-2 px-3 py-2 rounded-lg border border-slate-200 text-slate-500 bg-white hover:border-red-200 hover:text-red-500 transition-all text-[10px] font-black uppercase tracking-wider shadow-sm active:scale-95 whitespace-nowrap h-9">
                        <i data-lucide="shield-alert" class="w-3.5 h-3.5"></i> Identificar Risco
                    </button>
                    
                    <div class="h-6 w-px bg-slate-200 hidden sm:block"></div>

                    <!-- Navegação Compacta -->
                    <div id="periodNavigation" class="flex bg-slate-100 p-1 rounded-lg gap-0.5 border border-slate-200 no-scrollbar items-center h-9 overflow-hidden flex-nowrap shrink-0">
                        <!-- Injetado via JS dependendo do nível -->
                    </div>
                </div>
            </div>
        </header>

        <!-- ÁREA DA MATRIZ (Preenchimento Total) -->
        <main class="flex-1 overflow-hidden relative flex flex-col p-0 text-left">
            
            <div id="loadingOverlay" class="absolute inset-0 bg-white/80 backdrop-blur-sm z-50 flex flex-col items-center justify-center hidden">
                <div class="animate-spin rounded-full h-10 w-10 border-t-4 border-b-4 border-fmm-blue mb-3"></div>
                <p class="text-fmm-dark font-black text-[10px] uppercase tracking-widest animate-pulse">Sincronizando Matrix...</p>
            </div>

            <!-- CONTAINER DA TABELA -->
            <div class="flex-1 overflow-auto custom-scrollbar bg-white relative">
                <table class="text-[11px] text-left border-separate border-spacing-0 w-max min-w-full">
                    <thead id="tableHeader" class="z-30"></thead>
                    <tbody id="tableBody" class="divide-y divide-slate-100"></tbody>
                </table>
                
                <!-- EMPTY STATE -->
                <div id="emptyState" class="absolute inset-0 flex flex-col items-center justify-center text-slate-300 bg-white z-10 p-4 text-center">
                    <div class="bg-slate-50 p-6 rounded-full mb-4 border border-slate-100">
                        <i data-lucide="layout-grid" class="w-10 h-10 text-slate-200"></i>
                    </div>
                    <h3 class="text-sm font-black text-fmm-dark uppercase tracking-widest mb-1">Mapa Geral de Notas</h3>
                    <p class="text-xs text-slate-400">Filtre uma turma ou pesquise um aluno para começar.</p>
                </div>
            </div>
        </main>
    </main>

    <!-- MODAL FOTO ZOOM -->
    <div id="photoModal" class="hidden fixed inset-0 z-[200] flex items-center justify-center bg-black/90 backdrop-blur-md p-4" onclick="closePhotoModal()">
        <div class="relative animate-ui" onclick="event.stopPropagation()">
            <button onclick="closePhotoModal()" class="absolute -top-12 -right-4 text-white hover:text-fmm-lime transition-colors">
                <i data-lucide="x" class="w-8 h-8"></i>
            </button>
            <img id="enlargedPhoto" src="" class="max-w-[90vw] max-h-[80vh] rounded-[40px] shadow-2xl border-4 border-white/10 object-contain">
            <div id="enlargedName" class="mt-4 text-center text-white font-bold text-lg tracking-tight uppercase"></div>
        </div>
    </div>

    <script>
        let basicSubjects = [];
        let techSubjects = [];
        let currentClassData = [];
        let currentView = 'anual';
        let showRiskOnly = false;
        let searchTimeout = null;
        let isFundamental = false;
        let userLevels = [];

        const seriesByLevel = {
            'EF1': ['5º Ano'],
            'EF2': ['6º Ano', '7º Ano', '8º Ano', '9º Ano'],
            'EMT': ['1ª Série', '2ª Série', '3ª Série']
        };

        const TECH_CURRICULUM = {
            '1ª Série': { 1: ['AMC', 'CEI', 'PC', 'TM'], 2: ['CE', 'M3DMA', 'PMF', 'POO', 'DP'] },
            '2ª Série': { 1: ['AI-I', 'DW-I', 'ILR', 'LBD', 'PM'], 2: ['DW-II', 'PDM-I', 'LPR', 'IPF', 'DSE-I'] },
            '3ª Série': { 1: ['AI-II', 'DJ', 'DSE-II', 'PDM-II', 'PFI', 'PFM', 'SHP'], 2: ['GPP', 'GPS', 'IOT E NT', 'ONST', 'PCPS', 'TS', 'VC'] }
        };

        const HIDDEN_SUBJECTS = ['ATUAL', 'BIO.APL', 'ENS.RELIG', 'FÍSICA.APL', 'GEO.APL', 'HIST.APL', 'P.DESP', 'QUIM.APL', 'SIM'];

        // Lógica de Foto validada no Chrome
        function formatDriveUrl(url) {
            if (!url) return null;
            const idMatch = url.match(/\/d\/([a-zA-Z0-9_-]+)/) || url.match(/id=([a-zA-Z0-9_-]+)/);
            return idMatch ? `https://lh3.googleusercontent.com/d/${idMatch[1]}` : url;
        }

        async function init() {
            if(window.SidebarComponent) await SidebarComponent.render('sidebar-container');
            const { data: { user } } = await window.supabaseClient.auth.getUser();
            if (!user) return window.location.href = '../../index.html';

            const { data: profile } = await window.supabaseClient.from('perfis').select('cargo, niveis_acesso').eq('id', user.id).single();
            if (profile) {
                userLevels = profile.cargo === 'diretor' ? ['EF1', 'EF2', 'EMT'] : (profile.niveis_acesso || []);
            }

            await loadMetadata();
            updatePeriodNavigation();
            lucide.createIcons();
            
            document.addEventListener('click', (e) => {
                if (!e.target.closest('#globalSearchInput') && !e.target.closest('#searchDropdown')) {
                    document.getElementById('searchDropdown').classList.add('hidden');
                }
            });
        }

        async function loadMetadata() {
            const { data: turmas } = await window.supabaseClient.from('turmas').select('*').in('nivel', userLevels).order('nome');
            const select = document.getElementById('classSelector');
            if (turmas) {
                // TASK: Filtrar turmas de apoio
                const filteredTurmas = turmas.filter(t => 
                    !t.nome.includes('APROFUNDAMENTO') && 
                    !t.nome.includes('REFORÇO') && 
                    !t.nome.includes('CLUBE')
                );

                filteredTurmas.sort((a, b) => a.nome.localeCompare(b.nome, 'pt-BR', { numeric: true }));
                filteredTurmas.forEach(t => {
                    const opt = document.createElement('option');
                    opt.value = t.id;
                    opt.innerText = t.nome;
                    opt.dataset.serie = t.serie;
                    opt.dataset.nivel = t.nivel;
                    select.appendChild(opt);
                });
            }

            const { data: discs } = await window.supabaseClient.from('disciplinas').select('*').order('nome');
            let allowedSeries = [];
            userLevels.forEach(lvl => { if(seriesByLevel[lvl]) allowedSeries.push(...seriesByLevel[lvl]); });

            const visibleDiscs = discs ? discs.filter(d => !HIDDEN_SUBJECTS.includes(d.sigla)) : [];
            
            basicSubjects = visibleDiscs.filter(d => 
                d.tipo === 'BCC' && 
                (!d.series || d.series.length === 0 || d.series.some(s => allowedSeries.includes(s)))
            ).map(d => ({ ...d, shortName: d.sigla }));

            techSubjects = visibleDiscs.filter(d => 
                d.tipo === 'Técnica' && 
                (!d.series || d.series.length === 0 || d.series.some(s => allowedSeries.includes(s)))
            ).map(d => ({ ...d, shortName: d.sigla }));
        }

        async function handleGlobalSearch(val) {
            const dropdown = document.getElementById('searchDropdown');
            const resultsDiv = document.getElementById('searchResults');
            
            clearTimeout(searchTimeout);
            if (val.length < 3) { dropdown.classList.add('hidden'); return; }

            searchTimeout = setTimeout(async () => {
                const { data } = await window.supabaseClient
                    .from('alunos')
                    .select('ra, nome_completo, url_foto, turmas!inner(nome, nivel)')
                    .in('turmas.nivel', userLevels)
                    .or(`nome_completo.ilike.%${val}%,ra.ilike.%${val}%`)
                    .limit(5);

                if (data && data.length > 0) {
                    resultsDiv.innerHTML = data.map(a => {
                        const avatar = formatDriveUrl(a.url_foto) || `https://ui-avatars.com/api/?name=${encodeURIComponent(a.nome_completo)}&background=003c5b&color=fff`;
                        return `
                        <div onclick="navigateToDetail('${a.ra}')" class="search-item text-left">
                            <img src="${avatar}" class="w-10 h-10 rounded-xl object-cover bg-slate-100 border border-slate-100" onerror="this.src='https://ui-avatars.com/api/?name=AL&background=003c5b&color=fff'">
                            <div class="flex flex-col overflow-hidden text-left">
                                <span class="text-xs font-black text-fmm-dark uppercase truncate text-left">${a.nome_completo}</span>
                                <span class="text-[9px] font-bold text-slate-400 uppercase tracking-widest text-left">${a.turmas.nome} • RA: ${a.ra}</span>
                            </div>
                            <i data-lucide="chevron-right" class="w-4 h-4 ml-auto text-slate-300"></i>
                        </div>`;
                    }).join('');
                    dropdown.classList.remove('hidden');
                    lucide.createIcons();
                } else {
                    resultsDiv.innerHTML = '<p class="p-6 text-center text-xs font-black text-slate-300 uppercase tracking-widest text-left">Nenhum aluno localizado</p>';
                    dropdown.classList.remove('hidden');
                }
            }, 300);
        }

        function navigateToDetail(ra) {
            window.location.href = `../resultados/detalhesboletim_coordenador.html?ra=${ra}&origem=mapa`;
        }

        function updatePeriodNavigation() {
            const nav = document.getElementById('periodNavigation');
            const sel = document.getElementById('classSelector');
            const nivel = sel.options[sel.selectedIndex]?.dataset.nivel || '';
            isFundamental = (nivel === 'EF1' || nivel === 'EF2');

            let html = `<button onclick="switchPeriod('anual')" id="btn-anual" class="view-btn px-4 h-7 rounded-md text-[10px] font-black uppercase transition-all shrink-0 whitespace-nowrap ${currentView === 'anual' ? 'bg-fmm-blue text-white shadow-sm' : 'text-slate-500 hover:text-fmm-blue'}">Anual</button>`;
            
            if (isFundamental) {
                const bim = ['1_BIMESTRE', '2_BIMESTRE', '3_BIMESTRE', '4_BIMESTRE'];
                bim.forEach((b, i) => {
                    const active = currentView === b ? 'bg-fmm-blue text-white shadow-sm' : 'text-slate-500 hover:text-fmm-blue';
                    html += `<button onclick="switchPeriod('${b}')" id="btn-${b}" class="view-btn px-3 h-7 rounded-md text-[10px] font-black uppercase transition-all shrink-0 whitespace-nowrap ${active}">${i+1}B</button>`;
                });
            } else {
                const tri = ['1_TRIMESTRE', '2_TRIMESTRE', '3_TRIMESTRE'];
                tri.forEach((t, i) => {
                    const active = currentView === t ? 'bg-fmm-blue text-white shadow-sm' : 'text-slate-500 hover:text-fmm-blue';
                    html += `<button onclick="switchPeriod('${t}')" id="btn-${t}" class="view-btn px-3 h-7 rounded-md text-[10px] font-black uppercase transition-all shrink-0 whitespace-nowrap ${active}">${i+1}T</button>`;
                });
                html += `<div class="w-px bg-slate-300 mx-1 h-3 shrink-0"></div>`;
                html += `<button onclick="switchPeriod('1_SEMESTRE_TEC')" id="btn-1_SEMESTRE_TEC" class="view-btn px-3 h-7 rounded-md text-[10px] font-black uppercase transition-all shrink-0 whitespace-nowrap ${currentView === '1_SEMESTRE_TEC' ? 'bg-fmm-green text-white shadow-sm' : 'text-slate-500 hover:text-fmm-green'} flex items-center gap-1"><i data-lucide="cpu" class="w-3 h-3"></i>1S</button>`;
                html += `<button onclick="switchPeriod('2_SEMESTRE_TEC')" id="btn-2_SEMESTRE_TEC" class="view-btn px-3 h-7 rounded-md text-[10px] font-black uppercase transition-all shrink-0 whitespace-nowrap ${currentView === '2_SEMESTRE_TEC' ? 'bg-fmm-green text-white shadow-sm' : 'text-slate-500 hover:text-fmm-green'} flex items-center gap-1"><i data-lucide="cpu" class="w-3 h-3"></i>2S</button>`;
            }
            nav.innerHTML = html;
            lucide.createIcons();
        }

        async function loadClassMap() {
            const classId = document.getElementById('classSelector').value;
            if (!classId) return;

            updatePeriodNavigation();
            const loader = document.getElementById('loadingOverlay');
            const empty = document.getElementById('emptyState');
            loader.classList.remove('hidden');
            empty.classList.add('hidden');

            try {
                const { data: matriculas } = await window.supabaseClient.from('matriculas')
                    .select('id, ra_aluno, status, alunos(ra, nome_completo, url_foto)')
                    .eq('id_turma', classId).eq('status', 'CURSANDO').eq('ano_letivo', 2026);

                if (!matriculas || matriculas.length === 0) throw new Error("Sem alunos registrados.");
                matriculas.sort((a, b) => (a.alunos?.nome_completo || "").localeCompare(b.alunos?.nome_completo || ""));
                
                const ids = matriculas.map(m => m.id);

                let fetchPromises = [];
                if (isFundamental) {
                    fetchPromises = [
                        window.supabaseClient.from('notas_fundamental').select('*').in('id_matricula', ids),
                        window.supabaseClient.from('anual_fundamental').select('*').in('id_matricula', ids),
                        Promise.resolve({ data: [] })
                    ];
                } else {
                    fetchPromises = [
                        window.supabaseClient.from('notas_basica').select('*').in('id_matricula', ids),
                        window.supabaseClient.from('anual_basica').select('*').in('id_matricula', ids),
                        window.supabaseClient.from('notas_tecnica').select('*').in('id_matricula', ids)
                    ];
                }

                const [resNotas, resAnual, resTech] = await Promise.all(fetchPromises);

                currentClassData = matriculas.map(m => {
                    const student = { id: m.id, ra: m.alunos.ra, nome: m.alunos.nome_completo, foto: m.alunos.url_foto, gradesBCC: {}, gradesTEC: {} };
                    basicSubjects.forEach(s => {
                        const an = (resAnual.data || []).find(x => x.id_matricula === m.id && x.sigla_disciplina === s.sigla) || {};
                        const n1 = (resNotas.data || []).find(x => x.id_matricula === m.id && x.sigla_disciplina === s.sigla && (isFundamental ? x.periodo === '1_BIMESTRE' : x.periodo === '1_TRIMESTRE')) || {};
                        const n2 = (resNotas.data || []).find(x => x.id_matricula === m.id && x.sigla_disciplina === s.sigla && (isFundamental ? x.periodo === '2_BIMESTRE' : x.periodo === '2_TRIMESTRE')) || {};
                        const n3 = (resNotas.data || []).find(x => x.id_matricula === m.id && x.sigla_disciplina === s.sigla && (isFundamental ? x.periodo === '3_BIMESTRE' : x.periodo === '3_TRIMESTRE')) || {};
                        const n4 = isFundamental ? (resNotas.data || []).find(x => x.id_matricula === m.id && x.sigla_disciplina === s.sigla && x.periodo === '4_BIMESTRE') || {} : null;

                        student.gradesBCC[s.sigla] = { 
                            p1: n1[isFundamental ? 'nb' : 'nt'], p2: n2[isFundamental ? 'nb' : 'nt'], p3: n3[isFundamental ? 'nb' : 'nt'], p4: n4 ? n4.nb : null,
                            anual: an.media_final, raw: { n1, n2, n3, n4, an } 
                        };
                    });
                    if (!isFundamental) {
                        techSubjects.forEach(s => {
                            const s1 = (resTech.data || []).find(x => x.id_matricula === m.id && x.sigla_disciplina === s.sigla && x.periodo === '1_SEMESTRE') || {};
                            const s2 = (resTech.data || []).find(x => x.id_matricula === m.id && x.sigla_disciplina === s.sigla && x.periodo === '2_SEMESTRE') || {};
                            student.gradesTEC[s.sigla] = { s1: s1.nota_final_periodo, s2: s2.nota_final_periodo, raw: { s1, s2 } };
                        });
                    }
                    return student;
                });
                renderTable();
            } catch (err) { console.error(err); empty.classList.remove('hidden'); }
            finally { loader.classList.add('hidden'); lucide.createIcons(); }
        }

        function renderTable() {
            const thead = document.getElementById('tableHeader');
            const tbody = document.getElementById('tableBody');
            const sel = document.getElementById('classSelector');
            const currentSerie = sel.options[sel.selectedIndex]?.dataset.serie || '1ª Série';

            let columns = [];
            const isViewTech = currentView.includes('SEMESTRE_TEC');

            if (!isViewTech) {
                columns = basicSubjects.filter(s => !s.series || s.series.includes(currentSerie)).map(s => ({ id: s.sigla, label: s.shortName, tooltip: s.nome, isTech: false }));
            } else {
                const sem = currentView === '1_SEMESTRE_TEC' ? 1 : 2;
                const curriculo = TECH_CURRICULUM[currentSerie] || { 1: [], 2: [] };
                columns = techSubjects.filter(s => (curriculo[sem] || []).includes(s.sigla)).map(s => ({ id: s.sigla, label: s.shortName, tooltip: s.nome, isTech: true }));
                columns.sort((a,b) => a.label.localeCompare(b.label));
            }

            let headHTML = `<tr><th class="sticky-col-ra text-center">RA</th><th class="sticky-col-aluno text-left px-4">Estudante</th>`;
            columns.forEach(c => {
                const bg = c.isTech ? 'bg-fmm-green/90' : 'bg-[#1e293b]';
                headHTML += `<th class="px-2 text-center border-l border-white/5 ${bg}" title="${c.tooltip}">${c.label}</th>`;
            });
            thead.innerHTML = headHTML + `</tr>`;

            let bodyHTML = '';
            currentClassData.forEach((student) => {
                if (showRiskOnly) {
                    const hasRisk = columns.some(col => {
                        let val = 0;
                        if (col.isTech) val = student.gradesTEC[col.id]?.[currentView === '1_SEMESTRE_TEC' ? 's1' : 's2'];
                        else {
                            const mapping = { 'anual': 'anual', '1_TRIMESTRE': 'p1', '2_TRIMESTRE': 'p2', '3_TRIMESTRE': 'p3', '1_BIMESTRE': 'p1', '2_BIMESTRE': 'p2', '3_BIMESTRE': 'p3', '4_BIMESTRE': 'p4' };
                            val = student.gradesBCC[col.id]?.[mapping[currentView]];
                        }
                        return val > 0 && val < 6.0;
                    });
                    if (!hasRisk) return;
                }

                const avatar = formatDriveUrl(student.foto) || `https://ui-avatars.com/api/?name=${encodeURIComponent(student.nome)}&background=003c5b&color=fff`;
                
                bodyHTML += `<tr class="hover:bg-fmm-blue/5 transition-colors group text-left">
                    <td class="sticky-col-ra px-1 py-3 text-center font-mono font-bold text-slate-400 text-[10px]">${student.ra}</td>
                    <td class="sticky-col-aluno px-3 py-2 font-bold text-fmm-dark text-left">
                        <div class="flex items-center gap-2 text-left">
                            <img src="${avatar}" class="w-8 h-8 rounded-lg object-cover bg-white shadow-sm border border-slate-100 flex-shrink-0 cursor-zoom-in" 
                                 onclick="openPhotoModal('${avatar}', '${student.nome.replace(/'/g, "")}')" 
                                 onerror="this.src='https://ui-avatars.com/api/?name=AL&background=003c5b&color=fff'">
                            <button onclick="navigateToDetail('${student.ra}')" class="hover:text-fmm-blue hover:underline text-left truncate flex-1 tracking-tight text-[11px] md:text-xs uppercase">
                                ${student.nome}
                            </button>
                        </div>
                    </td>`;

                columns.forEach(col => {
                    let val = 0;
                    if (col.isTech) val = student.gradesTEC[col.id]?.[currentView === '1_SEMESTRE_TEC' ? 's1' : 's2'];
                    else {
                        const mapping = { 'anual': 'anual', '1_TRIMESTRE': 'p1', '2_TRIMESTRE': 'p2', '3_TRIMESTRE': 'p3', '1_BIMESTRE': 'p1', '2_BIMESTRE': 'p2', '3_BIMESTRE': 'p3', '4_BIMESTRE': 'p4' };
                        val = student.gradesBCC[col.id]?.[mapping[currentView]];
                    }
                    const color = (val > 0 && val < 6.0) ? 'risk-alert' : (val >= 6.0 ? 'text-fmm-blue font-black' : 'text-slate-300 font-medium');
                    bodyHTML += `<td class="grade-cell text-center font-mono text-[11px] ${color}">${(val > 0) ? Number(val).toFixed(1).replace('.', ',') : '-'}</td>`;
                });
                bodyHTML += `</tr>`;
            });
            tbody.innerHTML = bodyHTML || `<tr><td colspan="${columns.length + 2}" class="p-10 text-center text-slate-300 italic text-left">Nenhum registro encontrado.</td></tr>`;
        }

        function toggleRiskFilter() {
            showRiskOnly = !showRiskOnly;
            const btn = document.getElementById('btnRiskFilter');
            btn.classList.toggle('border-red-500', showRiskOnly);
            btn.classList.toggle('text-red-500', showRiskOnly);
            btn.classList.toggle('bg-red-50', showRiskOnly);
            renderTable();
        }

        function switchPeriod(p) {
            currentView = p;
            document.querySelectorAll('.view-btn').forEach(b => {
                const isItemTech = b.id.includes('TEC');
                const isSelected = b.id === `btn-${p}`;
                
                let baseClasses = "view-btn px-4 h-7 rounded-md text-[10px] font-black uppercase transition-all flex items-center justify-center whitespace-nowrap shrink-0";
                if(isSelected) {
                    const colorClass = isItemTech ? 'bg-fmm-green text-white shadow-sm' : 'bg-fmm-blue text-white shadow-sm';
                    b.className = `${baseClasses} ${colorClass}`;
                } else {
                    b.className = `${baseClasses} text-slate-500 hover:text-fmm-blue`;
                }
            });
            renderTable();
        }

        function openPhotoModal(src, name) {
            document.getElementById('enlargedPhoto').src = src;
            document.getElementById('enlargedName').innerText = name;
            document.getElementById('photoModal').classList.remove('hidden');
            lucide.createIcons();
        }

        function closePhotoModal() {
            document.getElementById('photoModal').classList.add('hidden');
        }

        window.onload = init;
    </script>
</body>
</html>
