<!DOCTYPE html>
<html lang="pt-pt">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Inspetoria | SME FMM</title>
    
    <!-- Meta Tags PWA Atualizadas -->
    <link rel="manifest" href="../manifest.json">
    <meta name="theme-color" content="#003c5b">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet"/>

    <!-- CORREÇÃO DE PATHS: De ../../ para ../ pois este arquivo está em /inspetor/ -->
    <script src="../assets/js/supabase_client.js"></script>
    <script src="../sidebar.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        fmm: {
                            dark: '#003c5b',
                            blue: '#00638f',
                            green: '#80a51b',
                            lime: '#c8d400',
                            bg: '#f8fafc',
                            level1: '#3b82f6',
                            level2: '#eab308',
                            level3: '#f97316',
                            level4: '#ef4444'
                        }
                    }
                }
            }
        }
    </script>

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; overflow: hidden; -webkit-tap-highlight-color: transparent; }
        .sidebar-transition { transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        
        .drawer { 
            position: fixed; top: 0; right: 0; bottom: 0; width: 500px; 
            background: white; z-index: 200; transform: translateX(100%); 
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
            box-shadow: -4px 0 24px rgba(0,0,0,0.1); display: flex; flex-direction: column; 
        }
        .drawer.open { transform: translateX(0); }

        @media (max-width: 767px) {
            .drawer { width: 100%; }
            main { padding-bottom: env(safe-area-inset-bottom); }
        }
        
        .level-dot { width: 6px; height: 6px; border-radius: 50%; background-color: #e2e8f0; transition: all 0.3s; }
        .level-dot.active-1 { background-color: #3b82f6; box-shadow: 0 0 6px rgba(59, 130, 246, 0.4); }
        .level-dot.active-2 { background-color: #eab308; box-shadow: 0 0 6px rgba(234, 179, 8, 0.4); }
        .level-dot.active-3 { background-color: #f97316; box-shadow: 0 0 6px rgba(249, 115, 22, 0.4); }
        .level-dot.active-4 { background-color: #ef4444; box-shadow: 0 0 6px rgba(239, 68, 68, 0.4); }
        
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in-up { animation: fadeInUp 0.3s ease-out forwards; }
        
        .card-hover:hover { transform: translateY(-4px); box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1); }
    </style>
</head>
<body class="flex h-screen w-screen overflow-hidden">

    <aside id="sidebar-container" class="sidebar-transition w-72 bg-fmm-dark text-white flex-shrink-0 flex flex-col shadow-2xl relative z-20"></aside>

    <main class="flex-1 flex flex-col min-w-0 bg-slate-50 overflow-hidden relative">
        <header class="bg-white border-b flex flex-col px-6 md:px-8 py-4 z-30 shadow-sm flex-shrink-0">
            <div class="flex items-center justify-between mb-4">
                <div class="flex flex-col text-left">
                    <h1 class="text-lg md:text-xl font-bold text-fmm-dark leading-tight">Gestão Disciplinar</h1>
                    <p class="text-[10px] md:text-xs text-slate-400 font-black uppercase tracking-widest">Aplicação de Notificação e Chamado</p>
                </div>
                
                <div class="flex items-center gap-3 md:gap-6">
                    <div class="hidden sm:flex flex-col items-end">
                        <span id="userName" class="text-xs font-black text-fmm-dark uppercase">...</span>
                        <span id="userRoleLabel" class="text-[9px] text-fmm-blue font-black uppercase tracking-widest opacity-60">Inspetor de Alunos</span>
                    </div>
                    <div id="userInitials" class="w-10 h-10 md:w-11 md:h-11 rounded-[12px] md:rounded-[14px] bg-gradient-to-br from-fmm-blue to-fmm-dark text-white flex items-center justify-center font-black shadow-lg uppercase text-xs md:text-sm border-2 border-white">?</div>
                </div>
            </div>

            <div class="relative w-full">
                <i data-lucide="search" class="absolute left-4 top-3 w-4 h-4 text-slate-400"></i>
                <input type="text" id="studentSearch" oninput="handleSearch(this.value)" placeholder="RA ou Nome..." class="w-full pl-11 pr-4 py-2.5 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:ring-2 focus:ring-fmm-blue text-sm">
            </div>
        </header>

        <div class="flex-1 overflow-y-auto p-4 md:p-8 pb-2 custom-scrollbar">
            <div id="studentsGrid" class="grid grid-cols-2 gap-4 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 md:gap-8"></div>
            <div id="loadingState" class="hidden col-span-full py-20 flex flex-col items-center justify-center text-slate-400">
                <i data-lucide="loader-2" class="w-8 h-8 mb-4 animate-spin text-fmm-blue"></i>
                <p class="text-xs font-bold uppercase tracking-widest">Sincronizando Alunos...</p>
            </div>
        </div>

        <!-- DRAWER DE DETALHES -->
        <div id="studentDrawer" class="drawer border-l border-slate-100 flex flex-col">
            <div class="p-6 border-b border-slate-100 flex justify-between items-start bg-slate-50 flex-shrink-0">
                <div class="flex gap-4 items-start">
                    <img id="drawerAvatar" src="" class="w-16 h-16 rounded-2xl object-cover border-2 border-white shadow-sm bg-white" onclick="openPhotoZoom()">
                    <div class="flex flex-col gap-1">
                        <h2 id="drawerName" class="text-lg font-black text-fmm-dark leading-tight line-clamp-2 uppercase">...</h2>
                        <span id="drawerRA" class="text-[10px] font-black text-slate-500 bg-white px-3 py-1 rounded-full border border-slate-200 mt-1 inline-block uppercase tracking-widest">RA: 0000</span>
                    </div>
                </div>
                <button onclick="closeDrawer()" class="p-2 hover:bg-slate-200 rounded-full text-slate-400 transition-colors"><i data-lucide="x" class="w-6 h-6"></i></button>
            </div>
            <div class="flex-1 overflow-y-auto p-6 custom-scrollbar space-y-6">
                <div id="inspectorWarningArea" class="hidden p-4 rounded-2xl text-xs font-bold border animate-fade-in-up"></div>
                <div class="flex items-center justify-between pt-2">
                    <h3 class="text-[10px] font-black text-slate-400 uppercase tracking-widest flex items-center gap-2">
                        <i data-lucide="history" class="w-3.5 h-3.5"></i> Histórico
                    </h3>
                    <button id="btnNewAction" onclick="openNewActionModal()" class="bg-fmm-blue hover:bg-fmm-dark text-white px-5 py-2.5 rounded-2xl font-black text-[10px] uppercase tracking-widest flex items-center gap-2 shadow-lg">
                        <i data-lucide="plus" class="w-3.5 h-3.5"></i> <span id="btnText">Nova Sanção</span>
                    </button>
                </div>
                <div id="historyList" class="space-y-4 pb-10"></div>
            </div>
        </div>

        <div id="actionModal" class="hidden fixed inset-0 z-[300] flex items-center justify-center bg-fmm-dark/60 backdrop-blur-sm p-4">
            <div class="bg-white w-full max-w-lg rounded-[32px] shadow-2xl flex flex-col animate-fade-in-up overflow-hidden max-h-[90vh]">
                <div id="modalHeader" class="p-6 border-b border-slate-100 flex justify-between items-center bg-slate-50">
                    <h2 class="text-lg font-bold text-fmm-dark flex items-center gap-2" id="modalTitle">Registrar Ocorrência</h2>
                    <button onclick="closeActionModal()" class="text-slate-400 hover:text-red-500"><i data-lucide="x" class="w-5 h-5"></i></button>
                </div>
                <div class="p-8 space-y-5">
                    <div id="levelNotice" class="hidden p-4 bg-orange-50 border border-orange-100 rounded-2xl flex gap-3">
                        <i data-lucide="alert-triangle" class="w-5 h-5 text-orange-500 flex-shrink-0"></i>
                        <div>
                            <h4 class="text-xs font-bold text-orange-700 uppercase mb-1 tracking-tight">Limite Atingido</h4>
                            <p class="text-[10px] text-orange-600 font-medium">Esta ação irá gerar um Chamado Pedagógico.</p>
                        </div>
                    </div>
                    <div class="space-y-1.5">
                        <label class="text-[10px] font-bold text-slate-400 uppercase ml-1 tracking-widest">Infração</label>
                        <select id="actionReason" class="w-full px-5 py-3 border border-slate-200 rounded-2xl text-xs font-bold text-slate-600 outline-none focus:ring-2 focus:ring-fmm-blue"></select>
                    </div>
                    <div class="space-y-1.5">
                        <label class="text-[10px] font-bold text-slate-400 uppercase ml-1 tracking-widest">Observações</label>
                        <textarea id="actionObs" rows="4" class="w-full px-5 py-3 bg-slate-50 border border-slate-200 rounded-2xl text-sm resize-none outline-none focus:ring-2 focus:ring-fmm-blue font-medium" placeholder="Detalhes..."></textarea>
                    </div>
                </div>
                <div class="p-6 border-t border-slate-100 bg-slate-50 flex justify-end gap-3">
                    <button onclick="closeActionModal()" class="px-6 py-3 text-xs font-bold text-slate-500 hover:bg-slate-100 rounded-2xl">Cancelar</button>
                    <button id="btnConfirmAction" onclick="submitAction()" class="px-10 py-3 bg-fmm-blue text-white text-xs font-black uppercase tracking-widest rounded-2xl shadow-xl">Confirmar</button>
                </div>
            </div>
        </div>
        
        <div id="photoModal" class="hidden fixed inset-0 z-[400] bg-fmm-dark/95 backdrop-blur-md flex flex-col items-center justify-center p-8" onclick="closePhotoZoom()">
            <img id="enlargedPhoto" src="" class="max-h-[80vh] max-w-full rounded-[40px] shadow-2xl border-4 border-white/10">
        </div>

    </main>

    <script>
        const INFRACTIONS = ["1. Entrar na instituição sem uniforme completo", "2. Praticar atitudes ou brincadeiras desrespeitosas ou agressivas", "8. Utilizar celular ou eletrônicos sem autorização", "15. Entrar ou sair da sala sem autorização", "21. Furar fila no refeitório", "Outros"];
        let currentUser = null, currentStudent = null, allStudents = [], allSancoes = [], allChamados = [];

        function formatDriveUrl(url) {
            if (!url) return null;
            const idMatch = url.match(/\/d\/([a-zA-Z0-9_-]+)/) || url.match(/id=([a-zA-Z0-9_-]+)/);
            return idMatch ? `https://lh3.googleusercontent.com/d/${idMatch[1] || idMatch[2]}` : url;
        }

        async function init() {
            if(window.SidebarComponent) await SidebarComponent.render('sidebar-container');
            const { data: { user } } = await window.supabaseClient.auth.getUser();
            if(!user) return window.location.href = "../index.html";
            const { data: profile } = await window.supabaseClient.from('perfis').select('*').eq('id', user.id).single();
            currentUser = profile;
            
            document.getElementById('userName').innerText = currentUser.nome_completo;
            document.getElementById('userInitials').innerText = currentUser.nome_completo.split(' ').map(n => n[0]).join('').substring(0, 2).toUpperCase();
            
            document.getElementById('actionReason').innerHTML = '<option value="">Selecione o motivo...</option>' + INFRACTIONS.map(inf => `<option value="${inf}">${inf}</option>`).join('');
            await loadData();
        }

        async function fetchAllRows(table, selectStr, pageSize = 1000) {
            let from = 0, all = [];
            while (true) {
                const { data, error } = await window.supabaseClient.from(table).select(selectStr).range(from, from + pageSize - 1);
                if (error) throw error;
                all = all.concat(data || []);
                if ((data || []).length < pageSize) break;
                from += pageSize;
            }
            return all;
        }

        async function loadData() {
            document.getElementById('loadingState').classList.remove('hidden');
            try {
                const [alunos, sancoes, chamados] = await Promise.all([
                    fetchAllRows('alunos', '*, turmas(nome)', 1000),
                    window.supabaseClient.from('sancoes_disciplinares').select('*').limit(10000),
                    window.supabaseClient.from('chamados_inspetoria').select('*').eq('status', 'Pendente') 
                ]);
                allStudents = alunos; allSancoes = sancoes.data || []; allChamados = chamados.data || [];
                renderGrid();
            } catch (err) { console.error(err); } finally { document.getElementById('loadingState').classList.add('hidden'); }
        }

        function renderGrid(filterVal = '') {
            const grid = document.getElementById('studentsGrid');
            grid.innerHTML = '';
            let filtered = allStudents.filter(s => s.nome_completo.toLowerCase().includes(filterVal.toLowerCase()) || s.ra.includes(filterVal));
            filtered.forEach(s => {
                const history = allSancoes.filter(sc => sc.ra_aluno === s.ra);
                s._totalN1 = history.filter(h => h.nivel === 1).length;
                s._hasCall = allChamados.some(c => c.aluno_ra === s.ra);
            });
            filtered.sort((a,b) => (b._hasCall - a._hasCall) || (b._totalN1 - a._totalN1)).slice(0, 80).forEach(s => {
                const history = allSancoes.filter(sc => sc.ra_aluno === s.ra);
                const avatar = formatDriveUrl(s.url_foto) || `https://ui-avatars.com/api/?name=${encodeURIComponent(s.nome_completo)}&background=random&size=256&color=fff&bold=true`;
                let dotsHTML = '';
                [1,2,3,4].forEach(lvl => {
                    const count = history.filter(h => h.nivel === lvl).length;
                    let dots = '';
                    for(let i=0; i<3; i++) dots += `<div class="level-dot ${i < Math.min(count, 3) ? 'active-'+lvl : ''}"></div>`;
                    dotsHTML += `<div class="flex flex-col items-center gap-1"><span class="text-[7px] font-black text-slate-400 uppercase">${lvl === 1 ? 'N' : lvl === 2 ? 'AV' : lvl === 3 ? 'AE' : 'S'}</span><div class="flex gap-0.5">${dots}</div></div>`;
                });
                const card = document.createElement('div');
                card.className = "bg-white rounded-[24px] border border-slate-100 shadow-sm card-hover cursor-pointer transition-all animate-fade-in-up overflow-hidden";
                card.onclick = () => openDrawer(s.ra);
                card.innerHTML = `
                    <div class="relative h-40 w-full bg-slate-100 overflow-hidden">
                        <img src="${avatar}" class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-110">
                        <div class="absolute inset-0 bg-gradient-to-t from-black/80 via-black/20 to-transparent"></div>
                        <div class="absolute top-2 right-2 flex flex-col gap-2">
                            ${s._hasCall ? `<div class="bg-red-50 text-white p-1.5 rounded-lg shadow-xl animate-pulse"><i data-lucide="bell" class="w-3 h-3"></i></div>` : ''}
                            ${s._totalN1 >= 3 ? `<div class="bg-orange-500 text-white px-2 py-0.5 rounded-lg text-[8px] font-black uppercase shadow-xl flex items-center gap-1"><i data-lucide="alert-circle" class="w-2 h-2"></i> Limite</div>` : ''}
                        </div>
                        <div class="absolute bottom-0 left-0 right-0 p-3 text-white">
                            <h3 class="font-black text-[11px] leading-tight uppercase truncate">${s.nome_completo}</h3>
                            <span class="text-[8px] font-black text-fmm-lime uppercase">RA: ${s.ra} • ${s.turmas?.nome || 'FMM'}</span>
                        </div>
                    </div>
                    <div class="p-2 bg-white flex justify-between items-center border-t border-slate-50">${dotsHTML}</div>`;
                grid.appendChild(card);
            });
            if (window.lucide) lucide.createIcons();
        }

        async function openDrawer(ra) {
            currentStudent = allStudents.find(s => s.ra === ra);
            document.getElementById('drawerName').innerText = currentStudent.nome_completo;
            document.getElementById('drawerRA').innerText = `RA: ${currentStudent.ra}`;
            document.getElementById('drawerAvatar').src = formatDriveUrl(currentStudent.url_foto) || `https://ui-avatars.com/api/?name=${encodeURIComponent(currentStudent.nome_completo)}&background=003c5b&color=fff`;
            await renderHistory();
            document.getElementById('studentDrawer').classList.add('open');
        }

        async function renderHistory() {
            const list = document.getElementById('historyList'), warn = document.getElementById('inspectorWarningArea'), btnText = document.getElementById('btnText');
            const history = allSancoes.filter(s => s.ra_aluno === currentStudent.ra).sort((a,b) => new Date(b.data_sancao) - new Date(a.data_sancao));
            const pending = allChamados.filter(c => c.aluno_ra === currentStudent.ra), totalN1 = history.filter(h => h.nivel === 1).length;
            if (pending.length) { warn.className = "p-4 rounded-2xl text-[10px] font-black uppercase bg-orange-50 text-orange-600 border border-orange-100 mb-4"; warn.innerHTML = "Chamado em análise"; warn.classList.remove('hidden'); }
            else if (totalN1 >= 3) { warn.className = "p-4 rounded-2xl text-[10px] font-black uppercase bg-red-50 text-red-600 border border-red-100 mb-4"; warn.innerHTML = `Limite de Notificações (${totalN1}/3)`; warn.classList.remove('hidden'); }
            else warn.classList.add('hidden');
            btnText.innerText = totalN1 >= 3 ? "Abrir Chamado" : "Nova Sanção";
            let html = pending.map(c => `<div class="bg-orange-50 p-4 rounded-2xl border border-orange-100"><span class="text-[9px] font-black uppercase text-orange-600">Chamado Pendente</span><p class="text-sm font-bold mt-1 uppercase">${c.motivo}</p></div>`).join('');
            html += history.map(h => `<div class="bg-white p-4 rounded-2xl border border-slate-100 shadow-sm"><div class="flex justify-between"><span class="text-[9px] font-black uppercase px-2 py-0.5 rounded-lg border bg-blue-50 text-blue-700">Nível ${h.nivel}</span><span class="text-[9px] text-slate-400 font-bold">${new Date(h.data_sancao).toLocaleDateString('pt-BR')}</span></div><p class="text-sm font-black mt-2 uppercase">${h.infracao}</p></div>`).join('');
            list.innerHTML = html || '<p class="text-center py-20 opacity-30 text-xs">Sem Histórico</p>';
            if (window.lucide) lucide.createIcons();
        }

        function openNewActionModal() {
            const history = allSancoes.filter(sc => sc.ra_aluno === currentStudent.ra), totalN1 = history.filter(h => h.nivel === 1).length;
            document.getElementById('levelNotice').classList.toggle('hidden', totalN1 < 3);
            document.getElementById('modalTitle').innerText = totalN1 >= 3 ? "Abrir Chamado Pedagógico" : "Registrar Sanção Nível 1";
            document.getElementById('actionModal').classList.remove('hidden');
        }

        async function submitAction() {
            const reason = document.getElementById('actionReason').value, obs = document.getElementById('actionObs').value;
            if(!reason) return alert("Selecione o motivo.");
            const history = allSancoes.filter(sc => sc.ra_aluno === currentStudent.ra), totalN1 = history.filter(h => h.nivel === 1).length;
            try {
                if (totalN1 >= 3) await window.supabaseClient.from('chamados_inspetoria').insert({ aluno_ra: currentStudent.ra, inspetor_id: currentUser.id, motivo: reason, observacoes: obs, status: 'Pendente', data_abertura: new Date().toISOString() });
                else await window.supabaseClient.from('sancoes_disciplinares').insert({ ra_aluno: currentStudent.ra, id_autor: currentUser.id, nivel: 1, infracao: reason, data_sancao: new Date().toISOString(), observacao: obs, codigo: `${new Date().getFullYear()}/${Math.floor(Math.random()*10000)}` });
                document.getElementById('actionModal').classList.add('hidden');
                await loadData(); if(currentStudent) await openDrawer(currentStudent.ra);
            } catch (err) { alert(err.message); }
        }

        function closeDrawer() { document.getElementById('studentDrawer').classList.remove('open'); }
        function closeActionModal() { document.getElementById('actionModal').classList.add('hidden'); }
        function handleSearch(val) { renderGrid(val); }
        function openPhotoZoom() { document.getElementById('photoModal').classList.remove('hidden'); document.getElementById('enlargedPhoto').src = document.getElementById('drawerAvatar').src; }
        function closePhotoZoom() { document.getElementById('photoModal').classList.add('hidden'); }
        window.onload = init;
    </script>
</body>
</html>
