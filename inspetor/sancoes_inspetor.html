<!DOCTYPE html>
<html lang="pt-pt">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Inspetoria | SME FMM</title>
    
    <!-- Meta Tags PWA -->
    <link rel="manifest" href="../manifest.json">
    <meta name="theme-color" content="#003c5b">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <script src="../assets/js/supabase_client.js"></script>
    <script src="../sidebar.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        fmm: {
                            dark: '#003c5b',
                            blue: '#00638f',
                            green: '#80a51b',
                            lime: '#c8d400',
                            bg: '#f8fafc',
                            level1: '#3b82f6',
                            level2: '#eab308',
                            level3: '#f97316',
                            level4: '#ef4444'
                        }
                    },
                    borderRadius: {
                        '40': '2.5rem'
                    }
                }
            }
        }
    </script>

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; overflow: hidden; -webkit-tap-highlight-color: transparent; }
        .sidebar-transition { transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        
        /* Pontos de Status Disciplinar */
        .level-dot { width: 6px; height: 6px; border-radius: 50%; background-color: #e2e8f0; transition: all 0.3s; }
        .level-dot.active-1 { background-color: #3b82f6; box-shadow: 0 0 6px rgba(59, 130, 246, 0.4); }
        .level-dot.active-2 { background-color: #eab308; box-shadow: 0 0 6px rgba(234, 179, 8, 0.4); }
        .level-dot.active-3 { background-color: #f97316; box-shadow: 0 0 6px rgba(249, 115, 22, 0.4); }
        .level-dot.active-4 { background-color: #ef4444; box-shadow: 0 0 6px rgba(239, 68, 68, 0.4); }
        
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in-up { animation: fadeInUp 0.3s ease-out forwards; }
        
        .card-hover:hover { transform: translateY(-6px); box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15); }
        
        .view-transition { transition: opacity 0.3s ease, transform 0.3s ease; }
        .hidden-view { opacity: 0; transform: scale(0.98); pointer-events: none; position: absolute; width: 100%; }

        .details-hero-photo {
            width: 160px;
            height: 160px;
            object-fit: cover;
            border-radius: 40px;
            border: 4px solid white;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            cursor: pointer;
            transition: transform 0.3s ease;
        }

        @media (max-width: 767px) {
            main { padding-bottom: env(safe-area-inset-bottom); }
            .details-hero-photo { width: 130px; height: 130px; }
        }
    </style>
</head>

<body class="flex h-screen w-screen overflow-hidden">

    <aside id="sidebar-container" class="sidebar-transition w-72 bg-fmm-dark text-white flex-shrink-0 flex flex-col shadow-2xl relative z-20"></aside>

    <main class="flex-1 flex flex-col min-w-0 bg-slate-50 overflow-hidden relative text-slate-700">
        
        <!-- VISUALIZAÇÃO: LISTA PRINCIPAL -->
        <div id="listView" class="flex-1 flex flex-col min-h-0 view-transition">
            <header class="bg-white border-b flex flex-col md:flex-row md:items-center md:justify-between px-6 md:px-8 py-4 md:h-20 z-30 shadow-sm flex-shrink-0 gap-4">
                <div class="flex items-center justify-between w-full md:w-auto">
                    <div class="flex flex-col text-left">
                        <h1 class="text-xl font-black text-fmm-dark tracking-tight">Gestão Disciplinar</h1>
                        <p class="text-[10px] md:text-xs text-slate-400 font-bold uppercase tracking-widest">Aplicação de Notificações e Chamados</p>
                    </div>
                    
                    <div class="flex items-center gap-3 md:hidden">
                        <div id="userInitialsMob" class="w-10 h-10 rounded-[12px] bg-gradient-to-br from-fmm-blue to-fmm-dark text-white flex items-center justify-center font-black shadow-lg border-2 border-white">?</div>
                    </div>
                </div>

                <div class="flex items-center gap-4 w-full md:w-auto">
                    <div class="relative flex-1 md:w-96 group">
                        <i data-lucide="search" class="absolute left-4 top-3 w-4 h-4 text-slate-400 group-focus-within:text-fmm-blue"></i>
                        <input type="text" id="studentSearch" oninput="handleSearch(this.value)" placeholder="Procurar aluno por nome ou RA..." class="w-full pl-11 pr-4 py-2.5 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:ring-2 focus:ring-fmm-blue text-sm font-medium">
                    </div>
                    
                    <div class="hidden md:flex items-center gap-4 border-l pl-4 border-slate-100">
                        <div class="flex flex-col items-end">
                            <span id="userName" class="text-xs font-black text-fmm-dark uppercase leading-tight">...</span>
                            <span id="userRoleLabel" class="text-[9px] text-fmm-blue font-black uppercase tracking-widest opacity-60">Inspetor de Alunos</span>
                        </div>
                        <div id="userInitials" class="w-11 h-11 rounded-[14px] bg-gradient-to-br from-fmm-blue to-fmm-dark text-white flex items-center justify-center font-black shadow-lg border-2 border-white">?</div>
                    </div>
                </div>
            </header>

            <div class="flex-1 overflow-y-auto p-4 md:p-8 custom-scrollbar">
                <div id="studentsGrid" class="grid grid-cols-2 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4 md:gap-8"></div>
                <div id="loadingState" class="hidden col-span-full py-20 flex flex-col items-center justify-center text-slate-400">
                    <i data-lucide="loader-2" class="w-8 h-8 mb-4 animate-spin text-fmm-blue"></i>
                    <p class="text-xs font-bold uppercase tracking-widest">Sincronizando Base de Alunos...</p>
                </div>
            </div>
        </div>

        <!-- VISUALIZAÇÃO: DETALHES DO ALUNO -->
        <div id="detailsView" class="hidden flex-1 flex flex-col min-h-0 view-transition bg-white">
            <header class="bg-white h-16 md:h-20 border-b flex items-center px-4 md:px-8 z-10 shadow-sm flex-shrink-0 gap-4">
                <button onclick="hideDetails()" class="p-2.5 hover:bg-slate-100 rounded-2xl text-slate-500 transition-all flex items-center gap-2 group">
                    <i data-lucide="arrow-left" class="w-5 h-5 group-hover:-translate-x-1 transition-transform"></i>
                    <span class="hidden md:inline text-sm font-bold">Voltar para a lista</span>
                </button>
                <div class="h-8 w-px bg-slate-200 hidden md:block"></div>
                <h2 class="text-sm md:text-lg font-black text-fmm-dark uppercase tracking-tight">Ficha Disciplinar Individual</h2>
            </header>

            <div class="flex-1 overflow-y-auto custom-scrollbar bg-slate-50/50">
                <div class="max-w-4xl mx-auto p-4 md:p-12 space-y-6 md:space-y-10">
                    
                    <!-- HERO: Perfil -->
                    <div class="bg-white p-6 md:p-8 rounded-[32px] md:rounded-[48px] shadow-sm border border-slate-100 flex flex-col md:flex-row items-center gap-6 md:gap-8 animate-fade-in-up">
                        <img id="detailsHeroAvatar" src="" class="details-hero-photo" onclick="openPhotoZoom(this.src)">
                        <div class="flex flex-col text-center md:text-left gap-2">
                            <h2 id="detailsName" class="text-2xl md:text-3xl font-black text-fmm-dark uppercase tracking-tight leading-tight">...</h2>
                            <div class="flex flex-wrap items-center justify-center md:justify-start gap-2 md:gap-3">
                                <span id="detailsRA" class="px-4 py-1.5 bg-slate-100 text-slate-500 rounded-full text-[10px] md:text-xs font-bold border border-slate-200 uppercase tracking-widest">RA: ...</span>
                                <span id="detailsTurma" class="px-4 py-1.5 bg-fmm-blue/10 text-fmm-blue rounded-full text-[10px] md:text-xs font-black border border-fmm-blue/10 uppercase tracking-widest">...</span>
                            </div>
                        </div>
                    </div>

                    <!-- Avisos Dinâmicos -->
                    <div id="inspectorWarningArea" class="hidden p-5 rounded-3xl text-[10px] font-black uppercase tracking-widest border shadow-sm animate-fade-in-up"></div>

                    <!-- Seção de Histórico -->
                    <div class="space-y-6">
                        <div class="flex items-center justify-between">
                            <h3 class="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] flex items-center gap-2">
                                <i data-lucide="history" class="w-4 h-4 text-fmm-blue"></i>
                                Histórico Disciplinar Completo
                            </h3>
                            <button onclick="openNewActionModal()" class="bg-fmm-blue hover:bg-fmm-dark text-white px-5 py-2.5 rounded-2xl font-black text-[10px] uppercase tracking-widest flex items-center gap-2 transition-all shadow-lg active:scale-95">
                                <i data-lucide="plus-circle" class="w-4 h-4"></i> <span id="btnText">Nova Sanção</span>
                            </button>
                        </div>
                        <div id="historyList" class="grid grid-cols-1 md:grid-cols-2 gap-4 pb-12"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- MODAL DE SANÇÃO -->
        <div id="actionModal" class="hidden fixed inset-0 z-[300] flex items-center justify-center bg-fmm-dark/60 backdrop-blur-sm p-4">
            <div class="bg-white w-full max-w-lg rounded-[32px] shadow-2xl flex flex-col animate-fade-in-up overflow-hidden max-h-[90vh]">
                <div id="modalHeader" class="p-6 border-b border-slate-100 flex justify-between items-center bg-slate-50">
                    <h2 class="text-lg font-bold text-fmm-dark flex items-center gap-2" id="modalTitle">Registrar Ocorrência</h2>
                    <button onclick="closeActionModal()" class="text-slate-400 hover:text-red-500 transition-colors p-2 rounded-full"><i data-lucide="x" class="w-5 h-5"></i></button>
                </div>
                <div class="p-8 space-y-6">
                    <div id="levelNotice" class="hidden p-4 bg-orange-50 border border-orange-100 rounded-2xl flex gap-3">
                        <i data-lucide="alert-triangle" class="w-5 h-5 text-orange-500 flex-shrink-0"></i>
                        <div>
                            <h4 class="text-xs font-bold text-orange-700 uppercase mb-1 tracking-tight">Limite Atingido</h4>
                            <p class="text-[10px] text-orange-600 font-medium">Esta ação irá gerar um Chamado Pedagógico para a Coordenação.</p>
                        </div>
                    </div>
                    <div class="space-y-1.5">
                        <label class="text-[10px] font-bold text-slate-400 uppercase ml-1 tracking-widest">Infração Observada</label>
                        <select id="actionReason" class="w-full px-5 py-3 border border-slate-200 rounded-2xl text-xs font-bold text-slate-600 outline-none focus:ring-2 focus:ring-fmm-blue bg-slate-50"></select>
                    </div>
                    <div class="space-y-1.5">
                        <label class="text-[10px] font-bold text-slate-400 uppercase ml-1 tracking-widest">Observações Detalhadas</label>
                        <textarea id="actionObs" rows="4" class="w-full px-5 py-3 bg-slate-50 border border-slate-200 rounded-2xl text-sm resize-none outline-none focus:ring-2 focus:ring-fmm-blue font-medium" placeholder="Relate o ocorrido..."></textarea>
                    </div>
                </div>
                <div class="p-6 border-t border-slate-100 bg-slate-50 flex justify-end gap-3">
                    <button onclick="closeActionModal()" class="px-6 py-3 text-xs font-bold text-slate-500 hover:bg-slate-100 rounded-2xl">Cancelar</button>
                    <button id="btnConfirmAction" onclick="submitAction()" class="px-10 py-3 bg-fmm-blue text-white text-xs font-black uppercase tracking-widest rounded-2xl shadow-xl shadow-fmm-blue/20 transition-all active:scale-95">Confirmar Registro</button>
                </div>
            </div>
        </div>

        <!-- MODAL DE ZOOM -->
        <div id="photoZoomModal" class="hidden fixed inset-0 z-[400] bg-fmm-dark/95 backdrop-blur-md flex flex-col items-center justify-center p-8" onclick="closePhotoZoom()">
            <img id="enlargedPhoto" src="" class="max-h-[80vh] max-w-full rounded-[40px] shadow-2xl border-4 border-white/10 object-contain">
        </div>

    </main>

    <script>
        const INFRACTIONS = [
            "1. Entrar na instituição sem uniforme completo",
            "2. Usar celular ou fones de ouvido em áreas proibidas",
            "3. Usar acessórios proibidos ou tatuagens aparentes",
            "4. Usar cabelo, ou barba, fora do padrão institucional",
            "5. Manter unhas longas, sujas ou com esmalte",
            "6. Usar maquiagem ou cílios postiços",
            "9. Portar ou consumir alimentos fora do refeitório",
            "12. Trazer materiais estranhos às atividades escolares",
            "19. Causar algazarra ou correr nas dependências da instituição",
            "20. Deixar pertences pessoais em áreas comuns",
            "21. Furar fila no refeitório",
            "23. Usar a mesa do professor ou a lousa sem autorização",
            "28. Manter contato físico íntimo na escola",
            "43. Emprestar o uniforme escolar a terceiros",
            "44. Usar o uniforme em ambientes inadequados",
            "48. Escovar os dentes circulando pelos corredores"
        ];
        let currentUser = null, currentStudent = null, allStudents = [], allSancoes = [], allChamados = [];

        function formatDriveUrl(url) {
            if (!url) return null;
            const idMatch = url.match(/\/d\/([a-zA-Z0-9_-]+)/) || url.match(/id=([a-zA-Z0-9_-]+)/);
            return idMatch ? `https://lh3.googleusercontent.com/d/${idMatch[1] || idMatch[2]}` : url;
        }

        async function init() {
            if(window.SidebarComponent) await SidebarComponent.render('sidebar-container');
            const { data: { user } } = await window.supabaseClient.auth.getUser();
            if(!user) return window.location.href = "../index.html";
            
            const { data: profile } = await window.supabaseClient.from('perfis').select('*').eq('id', user.id).single();
            currentUser = profile;
            
            const initials = currentUser.nome_completo ? currentUser.nome_completo.split(' ').map(n => n[0]).join('').substring(0, 2).toUpperCase() : "??";
            document.getElementById('userName').innerText = currentUser.nome_completo || 'Inspetor';
            document.getElementById('userInitials').innerText = initials;
            document.getElementById('userInitialsMob').innerText = initials;
            
            document.getElementById('actionReason').innerHTML = '<option value="">Selecione o motivo...</option>' + INFRACTIONS.map(inf => `<option value="${inf}">${inf}</option>`).join('');
            
            await loadData();
        }

        async function fetchAllRows(table, selectStr, pageSize = 1000) {
            let from = 0, all = [];
            while (true) {
                const { data, error } = await window.supabaseClient.from(table).select(selectStr).range(from, from + pageSize - 1);
                if (error) throw error;
                all = all.concat(data || []);
                if ((data || []).length < pageSize) break;
                from += pageSize;
            }
            return all;
        }

        async function loadData() {
            document.getElementById('loadingState').classList.remove('hidden');
            try {
                // TASK: Join robusto com alias 'autor' para perfis para exibir nome real.
                const [alunos, sancoes, chamados] = await Promise.all([
                    fetchAllRows('alunos', '*, turmas(nome)', 1000),
                    window.supabaseClient.from('sancoes_disciplinares').select('*, autor:perfis(nome_completo)').limit(10000),
                    window.supabaseClient.from('chamados_inspetoria').select('*, autor:perfis(nome_completo)').eq('status', 'Pendente') 
                ]);
                allStudents = alunos; allSancoes = sancoes.data || []; allChamados = chamados.data || [];
                renderGrid();
            } catch (err) { console.error(err); } finally { document.getElementById('loadingState').classList.add('hidden'); }
        }

        function renderGrid(filterVal = '') {
            const grid = document.getElementById('studentsGrid');
            grid.innerHTML = '';
            let filtered = allStudents.filter(s => s.nome_completo.toLowerCase().includes(filterVal.toLowerCase()) || s.ra.includes(filterVal));
            
            filtered.forEach(s => {
                const history = allSancoes.filter(sc => sc.ra_aluno === s.ra);
                s._totalN1 = history.filter(h => h.nivel === 1).length;
                s._hasCall = allChamados.some(c => c.aluno_ra === s.ra);
            });

            filtered.sort((a,b) => (b._hasCall - a._hasCall) || (b._totalN1 - a._totalN1)).slice(0, 80).forEach(s => {
                const history = allSancoes.filter(sc => sc.ra_aluno === s.ra);
                const avatar = formatDriveUrl(s.url_foto) || `https://ui-avatars.com/api/?name=${encodeURIComponent(s.nome_completo)}&background=random&size=256&color=fff&bold=true`;
                const isLimitReached = s._totalN1 >= 3;
                
                let dotsHTML = '';
                [1,2,3,4].forEach(lvl => {
                    const count = history.filter(h => h.nivel === lvl).length;
                    let dots = '';
                    for(let i=0; i<3; i++) dots += `<div class="level-dot ${i < Math.min(count, 3) ? 'active-'+lvl : ''}"></div>`;
                    const label = lvl === 1 ? 'N' : lvl === 2 ? 'AV' : lvl === 3 ? 'AE' : 'S';
                    dotsHTML += `<div class="flex flex-col items-center gap-1"><span class="text-[7px] font-black text-slate-400 uppercase tracking-tighter">${label}</span><div class="flex gap-0.5">${dots}</div></div>`;
                });

                const card = document.createElement('div');
                card.className = "bg-white rounded-[24px] md:rounded-[32px] border border-slate-100 shadow-sm card-hover cursor-pointer transition-all animate-fade-in-up overflow-hidden group";
                card.onclick = () => showDetails(s.ra);
                
                card.innerHTML = `
                    <div class="relative h-40 md:h-56 w-full bg-slate-100 overflow-hidden">
                        <img src="${avatar}" class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-110" loading="lazy">
                        <div class="absolute inset-0 bg-gradient-to-t from-black/80 via-black/20 to-transparent"></div>
                        <div class="absolute top-2 right-2 flex flex-col gap-2">
                            ${s._hasCall ? `<div class="bg-red-50 text-white p-1.5 rounded-lg shadow-xl animate-pulse"><i data-lucide="bell" class="w-3 h-3"></i></div>` : ''}
                            ${isLimitReached ? `<div class="bg-orange-500 text-white px-2 py-0.5 rounded-lg text-[8px] font-black uppercase shadow-xl flex items-center gap-1"><i data-lucide="alert-circle" class="w-2 h-2"></i> Limite</div>` : ''}
                        </div>
                        <div class="absolute bottom-0 left-0 right-0 p-3 md:p-5 text-white">
                            <h3 class="font-black text-[11px] md:text-sm leading-tight uppercase tracking-tight line-clamp-1">${s.nome_completo}</h3>
                            <div class="flex items-center gap-1 md:gap-2 mt-0.5 md:mt-1">
                                <span class="text-[8px] md:text-[9px] font-black text-fmm-lime uppercase tracking-widest">RA: ${s.ra}</span>
                                <span class="text-white/30 mx-0.5">•</span>
                                <span class="text-[8px] md:text-[9px] font-black text-white/90 uppercase tracking-widest">${s.turmas?.nome || 'FMM'}</span>
                            </div>
                        </div>
                    </div>
                    <div class="p-2 md:p-5 bg-white flex justify-between items-center border-t border-slate-50">${dotsHTML}</div>
                `;
                grid.appendChild(card);
            });
            if (window.lucide) lucide.createIcons();
        }

        async function showDetails(ra) {
            currentStudent = allStudents.find(s => s.ra === ra);
            const avatar = formatDriveUrl(currentStudent.url_foto) || `https://ui-avatars.com/api/?name=${encodeURIComponent(currentStudent.nome_completo)}&background=003c5b&color=fff&size=512`;
            
            document.getElementById('detailsName').innerText = currentStudent.nome_completo;
            document.getElementById('detailsRA').innerText = `RA: ${currentStudent.ra}`;
            document.getElementById('detailsTurma').innerText = `TURMA: ${currentStudent.turmas?.nome || 'FMM'}`;
            document.getElementById('detailsHeroAvatar').src = avatar;

            document.getElementById('listView').classList.add('hidden-view');
            setTimeout(() => {
                document.getElementById('listView').classList.add('hidden');
                document.getElementById('detailsView').classList.remove('hidden');
                setTimeout(() => {
                    document.getElementById('detailsView').classList.remove('hidden-view');
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                }, 50);
            }, 300);

            await renderHistory();
        }

        function hideDetails() {
            document.getElementById('detailsView').classList.add('hidden-view');
            setTimeout(() => {
                document.getElementById('detailsView').classList.add('hidden');
                document.getElementById('listView').classList.remove('hidden');
                setTimeout(() => {
                    document.getElementById('listView').classList.remove('hidden-view');
                }, 50);
            }, 300);
            currentStudent = null;
        }

        async function renderHistory() {
            const list = document.getElementById('historyList'), warn = document.getElementById('inspectorWarningArea'), btnText = document.getElementById('btnText');
            
            const history = allSancoes.filter(s => s.ra_aluno === currentStudent.ra).sort((a,b) => new Date(b.data_sancao) - new Date(a.data_sancao));
            const pending = allChamados.filter(c => c.aluno_ra === currentStudent.ra), totalN1 = history.filter(h => h.nivel === 1).length;

            if (pending.length) { 
                warn.className = "p-4 rounded-2xl text-[10px] font-black uppercase bg-orange-50 text-orange-600 border border-orange-100 mb-4 shadow-sm"; 
                warn.innerHTML = "Chamado em análise pela Coordenação"; 
                warn.classList.remove('hidden'); 
            } else if (totalN1 >= 3) { 
                warn.className = "p-4 rounded-2xl text-[10px] font-black uppercase bg-red-50 text-red-600 border border-red-100 mb-4 shadow-sm"; 
                warn.innerHTML = `Limite de Notificações Atingido (${totalN1}/3)`; 
                warn.classList.remove('hidden'); 
            } else warn.classList.add('hidden');

            btnText.innerText = totalN1 >= 3 ? "Abrir Chamado" : "Nova Sanção";

            let html = pending.map(c => `
                <div class="bg-orange-50 p-5 rounded-3xl border border-orange-100 relative overflow-hidden animate-fade-in-up shadow-sm">
                    <div class="absolute left-0 top-0 bottom-0 w-1.5 bg-orange-400"></div>
                    <div class="flex justify-between items-start">
                         <span class="text-[9px] font-black uppercase text-orange-600 px-2 py-1 bg-white rounded-lg shadow-sm">Chamado Ativo</span>
                         <span class="text-[9px] text-orange-400 font-bold tracking-widest uppercase">${new Date(c.data_abertura).toLocaleDateString('pt-BR')}</span>
                    </div>
                    <p class="text-sm font-black mt-3 uppercase text-slate-700 leading-tight">${c.motivo}</p>
                    <div class="mt-4 pt-4 border-t border-orange-100 flex items-center gap-2">
                        <div class="w-6 h-6 bg-orange-100 rounded-full flex items-center justify-center text-orange-600 font-bold text-[8px] uppercase">${(c.autor?.nome_completo || 'I').charAt(0)}</div>
                        <div>
                             <span class="text-[8px] font-black text-orange-300 uppercase tracking-widest block leading-none">Iniciado por</span>
                             <span class="text-[9px] font-black text-orange-600 uppercase">${c.autor?.nome_completo || 'Sistema'}</span>
                        </div>
                    </div>
                </div>`).join('');

            html += history.map(h => `
                <div class="bg-white p-5 rounded-3xl border border-slate-100 shadow-sm flex flex-col animate-fade-in-up">
                    <div class="flex justify-between items-start mb-4">
                        <span class="text-[9px] font-black uppercase px-2.5 py-1 rounded-lg border bg-blue-50 text-blue-700 shadow-sm">Nível ${h.nivel}</span>
                        <span class="text-[9px] text-slate-400 font-bold tracking-widest uppercase">${new Date(h.data_sancao).toLocaleDateString('pt-BR')}</span>
                    </div>
                    <p class="text-sm font-black uppercase text-slate-700 leading-tight">${h.infracao}</p>
                    <div class="mt-4 pt-4 border-t border-slate-50 flex justify-between items-center">
                        <div class="flex items-center gap-2">
                             <div class="w-6 h-6 bg-slate-100 rounded-full flex items-center justify-center text-slate-400 font-bold text-[8px] uppercase">${(h.autor?.nome_completo || 'S').charAt(0)}</div>
                             <div class="flex flex-col">
                                <span class="text-[8px] font-black text-slate-300 uppercase tracking-widest leading-none">Aplicado por</span>
                                <span class="text-[9px] font-black text-fmm-blue uppercase">${h.autor?.nome_completo || 'Sistema'}</span>
                             </div>
                        </div>
                        ${h.observacao ? `<button onclick="alert('Observação: ${h.observacao.replace(/'/g, "\\'")}')" class="p-2 text-slate-300 hover:text-fmm-blue transition-colors"><i data-lucide="info" class="w-4 h-4"></i></button>` : ''}
                    </div>
                </div>`).join('');

            list.innerHTML = html || '<div class="col-span-full py-20 text-center opacity-30 flex flex-col items-center gap-2"><i data-lucide="clipboard-x" class="w-10 h-10"></i><p class="text-xs font-bold uppercase tracking-[0.2em]">Sem Histórico</p></div>';
            if (window.lucide) lucide.createIcons();
        }

        function openNewActionModal() {
            const history = allSancoes.filter(sc => sc.ra_aluno === currentStudent.ra), totalN1 = history.filter(h => h.nivel === 1).length;
            document.getElementById('levelNotice').classList.toggle('hidden', totalN1 < 3);
            document.getElementById('modalTitle').innerText = totalN1 >= 3 ? "Abrir Chamado Pedagógico" : "Registrar Sanção Nível 1";
            document.getElementById('actionModal').classList.remove('hidden');
        }

        async function submitAction() {
            const reason = document.getElementById('actionReason').value, obs = document.getElementById('actionObs').value;
            if(!reason) return alert("Selecione o motivo da infração.");
            const history = allSancoes.filter(sc => sc.ra_aluno === currentStudent.ra), totalN1 = history.filter(h => h.nivel === 1).length;
            const btn = document.getElementById('btnConfirmAction');
            btn.disabled = true; btn.innerText = "Salvando...";

            try {
                if (totalN1 >= 3) {
                    await window.supabaseClient.from('chamados_inspetoria').insert({ aluno_ra: currentStudent.ra, inspetor_id: currentUser.id, motivo: reason, observacoes: obs, status: 'Pendente', data_abertura: new Date().toISOString() });
                } else {
                    await window.supabaseClient.from('sancoes_disciplinares').insert({ ra_aluno: currentStudent.ra, id_autor: currentUser.id, nivel: 1, infracao: reason, data_sancao: new Date().toISOString(), observacao: obs, codigo: `${new Date().getFullYear()}/${Math.floor(Math.random()*10000)}` });
                }
                document.getElementById('actionModal').classList.add('hidden');
                await loadData(); if(currentStudent) await renderHistory();
            } catch (err) { alert("Erro ao registrar: " + err.message); } finally { btn.disabled = false; btn.innerText = "Confirmar Registro"; }
        }

        function closeActionModal() { document.getElementById('actionModal').classList.add('hidden'); }
        function handleSearch(val) { renderGrid(val); }
        function openPhotoZoom(src) { document.getElementById('photoZoomModal').classList.remove('hidden'); document.getElementById('enlargedPhoto').src = src; }
        function closePhotoZoom() { document.getElementById('photoZoomModal').classList.add('hidden'); }
        window.onload = init;
    </script>
</body>
</html>
