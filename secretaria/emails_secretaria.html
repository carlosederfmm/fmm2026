<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comunicação aos Pais | SME FMM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <script src="../assets/js/supabase_client.js"></script>
    <script src="../sidebar.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        fmm: {
                            dark: '#003c5b',
                            blue: '#00638f',
                            green: '#80a51b',
                            lime: '#c8d400',
                            bg: '#f8fafc'
                        }
                    }
                }
            }
        }
    </script>

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; overflow: hidden; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        
        .alert-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .alert-card:hover { transform: translateY(-4px); box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1); border-color: #00638f; }

        .tab-btn { transition: all 0.2s; border-bottom: 3px solid transparent; }
        .tab-btn.active { color: #003c5b; border-bottom-color: #c8d400; font-weight: 800; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade { animation: fadeIn 0.3s ease-out forwards; }

        .zoom-photo { cursor: zoom-in; transition: transform 0.2s; }
        .zoom-photo:hover { transform: scale(1.05); }
    </style>
</head>
<body class="flex h-screen w-screen overflow-hidden text-slate-700 text-left">

    <aside id="sidebar-container" class="w-72 flex-shrink-0 bg-fmm-dark text-white z-20 shadow-2xl flex flex-col"></aside>

    <main class="flex-1 flex flex-col min-w-0 bg-slate-50 overflow-hidden relative">
        
        <!-- Header -->
        <header class="bg-white h-20 border-b border-slate-200 flex items-center justify-between px-8 z-10 shadow-sm flex-shrink-0">
            <div class="flex flex-col">
                <h1 class="text-xl font-black text-fmm-dark uppercase tracking-tight leading-none">Comunicação aos Pais</h1>
                <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest mt-1">Envio de comunicados por reincidência disciplinar</p>
            </div>
            
            <div class="flex items-center gap-4">
                <div class="bg-slate-100 p-1 rounded-2xl flex gap-1">
                    <button onclick="switchTab('pending')" id="tab-pending" class="tab-btn active px-4 py-2 text-xs uppercase tracking-widest">Pendentes</button>
                    <button onclick="switchTab('sent')" id="tab-sent" class="tab-btn px-4 py-2 text-xs text-slate-400 uppercase tracking-widest">Enviados</button>
                </div>
                <button onclick="loadAlerts()" class="p-2.5 bg-slate-100 hover:bg-slate-200 rounded-xl text-slate-500 transition-all">
                    <i data-lucide="rotate-cw" class="w-4 h-4"></i>
                </button>
            </div>
        </header>

        <!-- Conteúdo Principal -->
        <div class="flex-1 overflow-y-auto p-8 custom-scrollbar">
            <div id="loadingState" class="hidden py-24 flex flex-col items-center justify-center text-slate-300">
                <i data-lucide="loader-2" class="w-12 h-12 mb-4 animate-spin text-fmm-blue"></i>
                <p class="text-xs font-black uppercase tracking-widest">Sincronizando sanções...</p>
            </div>

            <div id="emptyState" class="hidden py-24 flex flex-col items-center justify-center text-slate-300 bg-white rounded-[40px] border border-dashed border-slate-200">
                <i data-lucide="mail-check" class="w-16 h-16 mb-4 opacity-20"></i>
                <p id="emptyText" class="text-sm font-black uppercase tracking-widest opacity-40 text-center">Tudo em dia! Sem comunicados pendentes.</p>
            </div>

            <div id="alertsGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8">
                <!-- Cards populados via JS -->
            </div>
        </div>
    </main>

    <!-- MODAL: DETALHES E ENVIO -->
    <div id="emailWizardModal" class="hidden fixed inset-0 z-[100] flex items-center justify-center p-4 bg-fmm-dark/80 backdrop-blur-md">
        <div class="bg-white w-full max-w-4xl h-[85vh] rounded-[40px] shadow-2xl flex flex-col animate-fade overflow-hidden">
            <div class="p-8 border-b border-slate-100 flex justify-between items-center bg-white shrink-0">
                <div class="flex items-center gap-6">
                    <img id="modalAvatar" src="" class="w-16 h-16 rounded-2xl object-cover shadow-lg border-2 border-white zoom-photo" onclick="openPhotoZoom(this.src, document.getElementById('modalName').innerText)">
                    <div>
                        <h2 id="modalName" class="text-xl font-black text-fmm-dark uppercase tracking-tight">Nome do Aluno</h2>
                        <p id="modalInfo" class="text-[10px] text-slate-400 font-bold uppercase tracking-widest">RA: 000000 • Turma: ---</p>
                    </div>
                </div>
                <button onclick="closeModal()" class="w-12 h-12 flex items-center justify-center hover:bg-slate-100 rounded-full transition-all text-slate-400"><i data-lucide="x" class="w-6 h-6"></i></button>
            </div>

            <div class="flex-1 overflow-y-auto custom-scrollbar p-8 bg-slate-50/50 flex flex-col md:flex-row gap-8">
                <!-- Lado Esquerdo: Histórico -->
                <div class="flex-1 space-y-6">
                    <h3 class="text-[10px] font-black text-fmm-blue uppercase tracking-widest flex items-center gap-2">
                        <i data-lucide="history" class="w-4 h-4"></i> Infrações do Nível
                    </h3>
                    <div id="infractionList" class="space-y-3"></div>
                </div>

                <!-- Lado Direito: Sugestão de E-mail -->
                <div class="flex-1 flex flex-col gap-4">
                    <div class="flex items-center justify-between">
                        <h3 class="text-[10px] font-black text-slate-400 uppercase tracking-widest flex items-center gap-2">
                            <i data-lucide="file-text" class="w-4 h-4"></i> Sugestão de Comunicado
                        </h3>
                        <button onclick="copyToClipboard()" class="text-[10px] font-black text-fmm-blue uppercase hover:underline flex items-center gap-1">
                            <i data-lucide="copy" class="w-3 h-3"></i> Copiar Texto
                        </button>
                    </div>
                    <textarea id="emailBody" readonly class="flex-1 p-6 bg-white border border-slate-200 rounded-3xl text-sm font-medium text-slate-600 leading-relaxed resize-none focus:outline-none shadow-sm custom-scrollbar"></textarea>
                </div>
            </div>

            <div class="p-8 border-t border-slate-100 bg-white flex justify-end gap-3 shrink-0">
                <button onclick="closeModal()" class="px-8 py-3.5 text-xs font-black text-slate-400 uppercase rounded-2xl hover:bg-slate-50 transition-all">Cancelar</button>
                <button id="btnMarkSent" onclick="confirmSent()" class="px-10 py-3.5 bg-fmm-green text-white text-xs font-black uppercase rounded-2xl shadow-xl shadow-fmm-green/20 hover:scale-[1.02] transition-all">
                    Marcar como Enviado
                </button>
            </div>
        </div>
    </div>

    <!-- MODAL: ZOOM DA FOTO -->
    <div id="photoZoomModal" class="hidden fixed inset-0 z-[500] flex items-center justify-center p-4 bg-fmm-dark/95 backdrop-blur-xl" onclick="closePhotoZoom()">
        <div class="relative max-w-4xl w-full flex flex-col items-center gap-6 animate-fade" onclick="event.stopPropagation()">
            <button onclick="closePhotoZoom()" class="absolute -top-12 -right-4 text-white/50 hover:text-white transition-colors">
                <i data-lucide="x" class="w-8 h-8"></i>
            </button>
            <img id="zoomedImage" src="" class="max-h-[80vh] max-w-full rounded-[40px] shadow-2xl border-4 border-white/5 object-contain">
            <div id="zoomedName" class="text-white text-xl font-black uppercase tracking-widest bg-black/40 px-8 py-3 rounded-2xl backdrop-blur-md">...</div>
        </div>
    </div>

    <script>
        let allAlunos = [];
        let allSancoes = [];
        let allAlerts = [];
        let currentTab = 'pending';
        let selectedAlert = null;
        let currentUser = null;

        const MAP_NIVEIS = { 1: "Notificação", 2: "Advertência Verbal", 3: "Advertência Escrita" };
        const MAP_PROXIMO = { 1: "Advertência Verbal", 2: "Advertência Escrita", 3: "Suspensão" };

        async function init() {
            if(window.SidebarComponent) await SidebarComponent.render('sidebar-container');
            const { data: { user } } = await window.supabaseClient.auth.getUser();
            if (!user) return window.location.href = '../index.html';
            currentUser = user;

            lucide.createIcons();
            await loadAlerts();
        }

        async function loadAlerts() {
            const grid = document.getElementById('alertsGrid');
            const loading = document.getElementById('loadingState');
            const empty = document.getElementById('emptyState');

            grid.innerHTML = '';
            loading.classList.remove('hidden');
            empty.classList.add('hidden');

            try {
                // TASK: Busca dados garantindo que pegamos todos os alunos matriculados
                const [alunos, sancoes, alertas] = await Promise.all([
                    window.supabaseClient.from('alunos').select('ra, nome_completo, url_foto, turmas(nome)').eq('status', 'Cursando'),
                    window.supabaseClient.from('sancoes_disciplinares').select('*'),
                    window.supabaseClient.from('sancoes_alertas').select('*')
                ]);

                allAlunos = alunos.data || [];
                allSancoes = sancoes.data || [];
                allAlerts = alertas.data || [];

                renderAlertCards();
            } catch (err) {
                console.error(err);
            } finally {
                loading.classList.add('hidden');
            }
        }

        function renderAlertCards() {
            const grid = document.getElementById('alertsGrid');
            const empty = document.getElementById('emptyState');
            const emptyText = document.getElementById('emptyText');
            grid.innerHTML = '';

            const pendingAlerts = [];
            const sentAlerts = [];

            // Processamento de dados
            allAlunos.forEach(aluno => {
                const history = allSancoes.filter(s => s.ra_aluno === aluno.ra);
                [1, 2, 3].forEach(nivel => {
                    const levelInfractions = history.filter(h => h.nivel === nivel);
                    // Regra: Alerta surge ao atingir 3 sanções do mesmo nível
                    if (levelInfractions.length >= 3) {
                        const alertStatus = allAlerts.find(a => a.ra_aluno === aluno.ra && a.nivel === nivel);
                        const data = { aluno, nivel, infractions: levelInfractions, status: alertStatus?.status_email || 'pendente' };
                        
                        if (data.status === 'enviado') sentAlerts.push(data);
                        else pendingAlerts.push(data);
                    }
                });
            });

            const activeList = currentTab === 'pending' ? pendingAlerts : sentAlerts;

            if (activeList.length === 0) {
                emptyText.innerText = currentTab === 'pending' ? "Tudo em dia! Sem comunicados pendentes." : "Nenhum histórico de envio encontrado.";
                empty.classList.remove('hidden');
                return;
            }

            empty.classList.add('hidden');
            grid.innerHTML = activeList.map(item => {
                const avatar = formatDriveUrl(item.aluno.url_foto) || `https://ui-avatars.com/api/?name=${encodeURIComponent(item.aluno.nome_completo)}&background=003c5b&color=fff`;
                const colorLevel = item.nivel === 1 ? 'blue' : item.nivel === 2 ? 'amber' : 'orange';

                return `
                <div onclick='openWizard(${JSON.stringify(item).replace(/'/g, "&apos;")})' class="alert-card bg-white p-6 rounded-[32px] border border-slate-100 shadow-sm cursor-pointer animate-fade flex flex-col gap-5">
                    <div class="flex justify-between items-start">
                        <img src="${avatar}" class="w-12 h-12 rounded-2xl object-cover shadow-md border-2 border-white zoom-photo" 
                             onclick="event.stopPropagation(); openPhotoZoom(this.src, '${item.aluno.nome_completo.replace(/'/g, "")}')">
                        <span class="px-3 py-1 bg-${colorLevel}-50 text-${colorLevel}-600 text-[9px] font-black uppercase rounded-lg border border-${colorLevel}-100">
                            3x ${MAP_NIVEIS[item.nivel]}
                        </span>
                    </div>
                    <div class="flex-1 text-left">
                        <h4 class="text-xs font-black text-fmm-dark uppercase leading-tight line-clamp-1">${item.aluno.nome_completo}</h4>
                        <p class="text-[9px] font-bold text-slate-400 uppercase mt-1 tracking-widest">${item.aluno.turmas?.nome || 'FMM'} • RA: ${item.aluno.ra}</p>
                    </div>
                    <div class="pt-4 border-t border-slate-50 flex justify-between items-center">
                        <div class="flex -space-x-2">
                            ${item.infractions.slice(0, 3).map(() => `<div class="w-5 h-5 rounded-full border-2 border-white bg-${colorLevel}-400"></div>`).join('')}
                        </div>
                        <span class="text-[9px] font-black ${currentTab === 'pending' ? 'text-fmm-blue' : 'text-slate-300'} uppercase tracking-widest flex items-center gap-1">
                            ${currentTab === 'pending' ? 'Despachar' : 'Concluído'} <i data-lucide="${currentTab === 'pending' ? 'chevron-right' : 'check-circle'}" class="w-3 h-3"></i>
                        </span>
                    </div>
                </div>`;
            }).join('');
            lucide.createIcons();
        }

        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active', 'text-slate-400'));
            document.getElementById(`tab-${tab}`).classList.add('active');
            renderAlertCards();
        }

        function openWizard(item) {
            selectedAlert = item;
            document.getElementById('modalName').innerText = item.aluno.nome_completo;
            document.getElementById('modalInfo').innerText = `RA: ${item.aluno.ra} • Turma: ${item.aluno.turmas?.nome || 'FMM'}`;
            document.getElementById('modalAvatar').src = formatDriveUrl(item.aluno.url_foto) || `https://ui-avatars.com/api/?name=${encodeURIComponent(item.aluno.nome_completo)}&background=003c5b&color=fff`;

            const list = document.getElementById('infractionList');
            list.innerHTML = item.infractions.map(inf => `
                <div class="p-4 bg-white border border-slate-100 rounded-2xl shadow-sm text-left">
                    <div class="flex justify-between items-center mb-1">
                        <span class="text-[8px] font-black text-fmm-blue uppercase tracking-widest">${new Date(inf.data_sancao + 'T12:00:00').toLocaleDateString('pt-BR')}</span>
                    </div>
                    <p class="text-[11px] font-bold text-slate-600 uppercase leading-tight">${inf.infracao}</p>
                </div>
            `).join('');

            const listText = item.infractions.map(s => `- ${new Date(s.data_sancao + 'T12:00:00').toLocaleDateString('pt-BR')}: ${s.infracao}`).join('\n');
            const body = `Prezados Responsáveis,\n\nInformamos que o aluno(a) ${item.aluno.nome_completo} (RA: ${item.aluno.ra}) atingiu o limite de 3 ${MAP_NIVEIS[item.nivel]}s previstas no manual do aluno.\n\nHistórico de ocorrências deste nível:\n${listText}\n\nAlertamos que a reincidência neste ou em outros níveis disciplinares levará à aplicação de uma ${MAP_PROXIMO[item.nivel]}.\n\nAtenciosamente,\nSecretaria Acadêmica FMM`;
            document.getElementById('emailBody').value = body;

            const btn = document.getElementById('btnMarkSent');
            if (item.status === 'enviado') {
                btn.innerText = "Já Enviado";
                btn.disabled = true;
                btn.classList.add('opacity-50', 'cursor-not-allowed');
                btn.classList.replace('bg-fmm-green', 'bg-slate-200');
            } else {
                btn.innerText = "Marcar como Enviado";
                btn.disabled = false;
                btn.classList.remove('opacity-50', 'cursor-not-allowed');
                btn.classList.replace('bg-slate-200', 'bg-fmm-green');
            }

            document.getElementById('emailWizardModal').classList.remove('hidden');
            lucide.createIcons();
        }

        async function confirmSent() {
            if (!selectedAlert) return;
            const btn = document.getElementById('btnMarkSent');
            btn.disabled = true;
            btn.innerText = "Salvando...";

            try {
                const { error } = await window.supabaseClient.from('sancoes_alertas').upsert({
                    ra_aluno: selectedAlert.aluno.ra,
                    nivel: selectedAlert.nivel,
                    status_email: 'enviado',
                    enviado_por: currentUser.id,
                    data_envio: new Date().toISOString()
                }, { onConflict: 'ra_aluno, nivel' });

                if (error) throw error;

                closeModal();
                await loadAlerts();
            } catch (err) {
                alert("Erro ao atualizar status: " + err.message);
                btn.disabled = false;
                btn.innerText = "Marcar como Enviado";
            }
        }

        function openPhotoZoom(src, name) {
            const modal = document.getElementById('photoZoomModal');
            document.getElementById('zoomedImage').src = src;
            document.getElementById('zoomedName').innerText = name || "Aluno";
            modal.classList.remove('hidden');
            lucide.createIcons();
        }

        function closePhotoZoom() { document.getElementById('photoZoomModal').classList.add('hidden'); }

        function closeModal() { document.getElementById('emailWizardModal').classList.add('hidden'); selectedAlert = null; }

        function copyToClipboard() {
            const copyText = document.getElementById("emailBody");
            copyText.select();
            document.execCommand("copy");
            alert("Texto copiado para área de transferência!");
        }

        function formatDriveUrl(url) {
            if (!url) return null;
            const idMatch = url.match(/\/d\/([a-zA-Z0-9_-]+)/) || url.match(/id=([a-zA-Z0-9_-]+)/);
            return idMatch ? `https://lh3.googleusercontent.com/d/${idMatch[1]}` : url;
        }

        window.onload = init;
    </script>
</body>
</html>
