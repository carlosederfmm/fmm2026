<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SME FMM | Manutenção</title>
    
    <!-- Meta Tags PWA -->
    <meta name="theme-color" content="#003c5b">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <!-- Bibliotecas -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        fmm: {
                            dark: '#003c5b',
                            blue: '#00638f',
                            green: '#80a51b',
                            lime: '#c8d400',
                            bg: '#f8fafc'
                        }
                    }
                }
            }
        }
    </script>

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #003c5b; overflow: hidden; }
        
        @keyframes spin-slow {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .spin-slow { animation: spin-slow 8s linear infinite; }
        
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-ui { animation: fadeInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6 text-white relative">

    <!-- Elementos Visuais de Fundo -->
    <div class="absolute top-0 left-0 w-[500px] h-[500px] bg-fmm-blue rounded-full filter blur-[120px] opacity-20 -translate-x-1/2 -translate-y-1/2"></div>
    <div class="absolute bottom-0 right-0 w-[400px] h-[400px] bg-fmm-lime rounded-full filter blur-[120px] opacity-10 translate-x-1/2 translate-y-1/2"></div>

    <div class="max-w-md w-full z-10 text-center animate-ui">
        
        <!-- Logo em Destaque -->
        <div class="mb-10 inline-block p-6 bg-white/5 rounded-[40px] border border-white/10 backdrop-blur-md">
            <img src="assets/logo-fmm-white.png" alt="FMM Logo" class="h-12 mx-auto" onerror="this.src='https://ui-avatars.com/api/?name=FMM&background=c8d400&color=003c5b&size=128'">
        </div>

        <!-- Ícone de Manutenção Animado -->
        <div class="relative mb-8 flex justify-center">
            <div class="absolute inset-0 bg-fmm-lime/20 rounded-full blur-3xl scale-150"></div>
            <div class="w-24 h-24 bg-fmm-lime text-fmm-dark rounded-[32px] flex items-center justify-center shadow-2xl relative z-10 spin-slow">
                <i data-lucide="settings" class="w-12 h-12"></i>
            </div>
        </div>

        <!-- Texto de Aviso -->
        <h1 class="text-3xl font-black uppercase tracking-tighter mb-4">Sistema em Manutenção</h1>
        <div class="space-y-4">
            <p class="text-slate-300 text-sm font-medium leading-relaxed max-w-xs mx-auto">
                Estamos realizando atualizações importantes para melhorar sua experiência no <span class="text-fmm-lime font-bold">SME FMM 2026</span>.
            </p>
            
            <div class="pt-6">
                <div class="inline-flex items-center gap-3 px-5 py-2.5 bg-white/5 border border-white/10 rounded-2xl backdrop-blur-sm">
                    <div class="w-2 h-2 rounded-full bg-fmm-lime animate-pulse"></div>
                    <span class="text-[10px] font-black uppercase tracking-[0.2em] text-fmm-lime">Previsão de Retorno: 31/03/2026</span>
                </div>
            </div>
        </div>

        <!-- Rodapé -->
        <div class="mt-20 opacity-40">
            <p class="text-[9px] font-bold uppercase tracking-widest">Fundação Matias Machline • Equipe de Inteligente Educacional</p>
        </div>
    </div>

    <script>
        // Inicializa ícones Lucide
        lucide.createIcons();

        // Monitor de conexão: Avisa se a internet caiu durante a manutenção
        window.addEventListener('offline', () => {
            console.warn("Conexão perdida.");
        });
    </script>
</body>
</html>
