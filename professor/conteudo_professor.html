<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conteúdo de Aula | SME FMM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <script src="../assets/js/supabase_client.js"></script>
    <script src="../sidebar.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        fmm: {
                            dark: '#003c5b',
                            blue: '#00638f',
                            green: '#80a51b',
                            lime: '#c8d400',
                            bg: '#f1f5f9'
                        }
                    }
                }
            }
        }
    </script>

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; overflow: hidden; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        
        .top-bar-select { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 12px; padding: 8px 12px; font-size: 12px; font-weight: 700; color: #003c5b; outline: none; transition: all 0.2s; min-width: 140px; }
        .top-bar-select:focus { border-color: #00638f; background: white; box-shadow: 0 0 0 4px rgba(0, 99, 143, 0.05); }

        .content-card { background: white; border-radius: 32px; border: 1px solid #f1f5f9; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); transition: all 0.3s ease; }
        
        .history-item { transition: all 0.2s; cursor: pointer; border-left: 4px solid transparent; }
        .history-item:hover { background-color: #f8fafc; border-left-color: #c8d400; transform: translateX(4px); }
        .history-item.active { background-color: #f0f9ff; border-left-color: #00638f; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade { animation: fadeIn 0.3s ease-out forwards; }
    </style>
</head>
<body class="flex h-screen w-screen overflow-hidden text-left">

    <aside id="sidebar-container" class="sidebar-transition w-72 flex-shrink-0 bg-fmm-dark text-white flex flex-col shadow-2xl relative z-20"></aside>

    <main class="flex-1 flex flex-col min-w-0 overflow-hidden">
        
        <header class="bg-white h-20 border-b flex items-center justify-between px-8 z-30 shadow-sm flex-shrink-0">
            <div class="flex items-center gap-6">
                <div class="flex flex-col text-left">
                    <h1 class="text-base font-black text-fmm-dark tracking-tight flex items-center gap-2 leading-none">
                        <span class="w-1.5 h-4 bg-fmm-lime rounded-full"></span>
                        Conteúdo de Aula
                    </h1>
                </div>

                <div class="h-8 w-px bg-slate-100 hidden md:block"></div>

                <div class="flex items-center gap-2">
                    <input type="date" id="selectDate" onchange="loadClassContent()" class="top-bar-select w-36">
                    <select id="selectTurma" onchange="handleTurmaChange()" class="top-bar-select">
                        <option value="">Turma...</option>
                    </select>
                    <select id="selectDisc" onchange="loadClassContent()" class="top-bar-select w-44">
                        <option value="">Disciplina...</option>
                    </select>
                </div>
            </div>

            <div class="flex items-center gap-4">
                <div id="sync-status" class="hidden items-center gap-2 px-3 py-1.5 bg-fmm-blue/5 rounded-full border border-fmm-blue/10 animate-pulse">
                    <i data-lucide="refresh-ccw" class="w-3.5 h-3.5 text-fmm-blue"></i>
                    <span class="text-[9px] font-black text-fmm-blue uppercase">Sinc...</span>
                </div>
                <button onclick="saveContent()" id="btnSave" class="hidden px-6 py-2.5 bg-fmm-dark text-white rounded-xl text-[10px] font-black uppercase tracking-widest hover:bg-slate-800 transition-all flex items-center gap-2 shadow-lg">
                    <i data-lucide="save" class="w-4 h-4"></i> Salvar Registro
                </button>
            </div>
        </header>

        <div class="flex-1 overflow-hidden flex bg-slate-50">
            
            <!-- ÁREA DO FORMULÁRIO -->
            <div class="flex-1 overflow-y-auto p-8 custom-scrollbar">
                <div id="loading-overlay" class="hidden h-full flex flex-col items-center justify-center text-slate-300 gap-4">
                    <i data-lucide="loader-2" class="w-12 h-12 animate-spin text-fmm-blue"></i>
                    <p class="text-sm font-bold uppercase tracking-widest">Sincronizando...</p>
                </div>

                <div id="empty-view" class="h-full flex flex-col items-center justify-center text-center">
                    <div class="w-20 h-20 bg-white rounded-full shadow-xl flex items-center justify-center mb-6 border border-slate-100">
                        <i data-lucide="book-text" class="w-10 h-10 text-slate-200"></i>
                    </div>
                    <h3 class="text-lg font-bold text-slate-400 uppercase tracking-tight">Selecione os filtros acima</h3>
                    <p class="text-sm text-slate-300 italic font-medium">Você poderá registrar e consultar o histórico de aulas.</p>
                </div>

                <div id="content-form" class="hidden max-w-3xl mx-auto space-y-6 animate-fade">
                    <div class="content-card p-8 space-y-6">
                        <div class="flex items-center justify-between border-b border-slate-100 pb-6">
                            <div class="flex flex-col text-left">
                                <h2 class="text-xl font-black text-fmm-dark uppercase tracking-tight leading-none" id="display-turma-disc">---</h2>
                                <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest mt-2" id="display-date">--/--/----</p>
                            </div>
                            <div class="flex flex-col items-end">
                                <label class="text-[10px] font-black text-slate-400 uppercase mb-2">Número de Tempos</label>
                                <select id="inTempos" class="px-4 py-2 bg-slate-50 border border-slate-200 rounded-xl text-xs font-bold text-fmm-dark outline-none focus:ring-2 focus:ring-fmm-blue">
                                    <option value="1">1 Tempo</option>
                                    <option value="2">2 Tempos</option>
                                    <option value="3">3 Tempos</option>
                                    <option value="4">4 Tempos</option>
                                    <option value="5">5 Tempos</option>
                                </select>
                            </div>
                        </div>

                        <div class="space-y-2 text-left">
                            <label class="text-[10px] font-black text-slate-500 uppercase ml-1 tracking-widest">Descrição do Conteúdo Lecionado</label>
                            <textarea id="inConteudo" rows="8" class="w-full p-6 bg-slate-50 border border-slate-100 rounded-[24px] text-sm font-medium text-slate-700 outline-none focus:ring-4 focus:ring-fmm-blue/5 focus:bg-white focus:border-fmm-blue transition-all" placeholder="O que foi trabalhado hoje?"></textarea>
                        </div>

                        <div class="space-y-2 text-left">
                            <label class="text-[10px] font-black text-slate-500 uppercase ml-1 tracking-widest">Observações Pedagógicas (Opcional)</label>
                            <textarea id="inObs" rows="3" class="w-full p-6 bg-slate-50 border border-slate-100 rounded-[24px] text-sm font-medium text-slate-700 outline-none focus:ring-4 focus:ring-fmm-blue/5 focus:bg-white focus:border-fmm-blue transition-all" placeholder="Alguma observação relevante sobre a turma ou alunos?"></textarea>
                        </div>
                    </div>
                </div>
            </div>

            <!-- BARRA LATERAL DE HISTÓRICO -->
            <aside id="history-sidebar" class="hidden w-96 bg-white border-l border-slate-200 flex flex-col shrink-0 animate-fade">
                <div class="p-6 border-b border-slate-100 flex items-center justify-between bg-slate-50/30">
                    <h3 class="text-xs font-black text-fmm-dark uppercase tracking-widest flex items-center gap-2">
                        <i data-lucide="history" class="w-4 h-4"></i> Histórico de Registros
                    </h3>
                    <span id="history-count" class="px-2 py-1 bg-fmm-blue/10 text-fmm-blue text-[9px] font-black rounded-lg">0</span>
                </div>
                <div id="history-list" class="flex-1 overflow-y-auto p-4 space-y-3 custom-scrollbar">
                    <!-- Itens do histórico via JS -->
                </div>
            </aside>

        </div>
    </main>

    <!-- TOAST -->
    <div id="toast" class="fixed bottom-8 right-8 z-50 translate-y-20 opacity-0 transition-all duration-500">
        <div class="bg-slate-900 text-white px-8 py-5 rounded-2xl shadow-2xl flex items-center gap-4">
            <i data-lucide="check-circle" class="w-5 h-5 text-fmm-lime"></i>
            <span class="text-xs font-bold tracking-tight" id="toast-msg">Sincronizado</span>
        </div>
    </div>

    <script>
        let currentUser = null;
        let currentRecordId = null;
        let globalGrade = [];
        let teachesProjetoDeVida = false;
        let currentHistory = [];

        async function init() {
            if(window.SidebarComponent) await SidebarComponent.render('sidebar-container');
            const { data: { user } } = await window.supabaseClient.auth.getUser();
            if (!user) return window.location.href = '../index.html';
            const { data: profile } = await window.supabaseClient.from('perfis').select('*').eq('id', user.id).single();
            currentUser = profile;

            document.getElementById('selectDate').valueAsDate = new Date();
            await populateSelectors();
            lucide.createIcons();
        }

        async function populateSelectors() {
            const selectT = document.getElementById('selectTurma');
            const selectD = document.getElementById('selectDisc');
            let turmas = [], disciplinas = [];

            if (currentUser.cargo === 'coordenador' || currentUser.cargo === 'diretor') {
                const { data: t } = await window.supabaseClient.from('turmas').select('*').order('nome');
                const { data: d } = await window.supabaseClient.from('disciplinas').select('*').order('nome');
                turmas = t || []; disciplinas = d || [];
            } else {
                const { data: pvidaCheck } = await window.supabaseClient.from('professor_disciplinas')
                    .select('sigla_disciplina')
                    .eq('id_professor', currentUser.id)
                    .eq('sigla_disciplina', 'P.VIDA')
                    .maybeSingle();
                
                teachesProjetoDeVida = !!pvidaCheck;

                const { data: grade } = await window.supabaseClient.from('grade_horaria')
                    .select('id_turma, turmas(*), disciplinas(*)')
                    .eq('id_professor', currentUser.id);
                
                globalGrade = grade || [];

                if (teachesProjetoDeVida) {
                    const { data: allAllowedTurmas } = await window.supabaseClient.from('turmas')
                        .select('*')
                        .in('nivel', currentUser.niveis_acesso || [])
                        .order('nome');
                    turmas = allAllowedTurmas || [];
                } else {
                    turmas = Array.from(new Map(globalGrade.map(g => [g.id_turma, g.turmas])).values()).filter(t => t !== null);
                }
                
                turmas.sort((a, b) => a.nome.localeCompare(b.nome, undefined, { numeric: true }));
            }

            selectT.innerHTML = '<option value="">Turma...</option>' + turmas.map(t => `<option value="${t.id}">${t.nome} (${t.serie})</option>`).join('');
            selectD.innerHTML = '<option value="">Disciplina...</option>'; 
        }

        function handleTurmaChange() {
            const turmaId = document.getElementById('selectTurma').value;
            const selectD = document.getElementById('selectDisc');

            if (currentUser.cargo !== 'coordenador' && currentUser.cargo !== 'diretor') {
                if (!turmaId) {
                    selectD.innerHTML = '<option value="">Disciplina...</option>';
                } else {
                    const discFromGrade = globalGrade
                        .filter(g => g.id_turma === turmaId && g.disciplinas !== null)
                        .map(g => g.disciplinas);
                    
                    const uniqueDiscMap = new Map(discFromGrade.map(d => [d.sigla, d]));

                    if (teachesProjetoDeVida) {
                        uniqueDiscMap.set('P.VIDA', { sigla: 'P.VIDA', nome: 'PROJETO DE VIDA' });
                    }

                    const sortedDisc = Array.from(uniqueDiscMap.values()).sort((a, b) => a.nome.localeCompare(b.nome));
                    selectD.innerHTML = '<option value="">Disciplina...</option>' + sortedDisc.map(d => `<option value="${d.sigla}">${d.nome} (${d.sigla})</option>`).join('');
                }
            }
            loadClassContent();
        }

        async function loadClassContent() {
            const turmaId = document.getElementById('selectTurma').value;
            const discSigla = document.getElementById('selectDisc').value;
            const date = document.getElementById('selectDate').value;

            if (!turmaId || !discSigla) {
                document.getElementById('content-form').classList.add('hidden');
                document.getElementById('history-sidebar').classList.add('hidden');
                document.getElementById('empty-view').classList.remove('hidden');
                document.getElementById('btnSave').classList.add('hidden');
                return;
            }

            document.getElementById('empty-view').classList.add('hidden');
            document.getElementById('loading-overlay').classList.remove('hidden');
            document.getElementById('content-form').classList.add('hidden');

            try {
                // 1. Carrega registro da data específica
                const { data: record } = await window.supabaseClient.from('conteudos_aula')
                    .select('*')
                    .eq('id_turma', turmaId)
                    .eq('sigla_disciplina', discSigla)
                    .eq('data_aula', date)
                    .maybeSingle();

                currentRecordId = record?.id || null;
                document.getElementById('inTempos').value = record?.numero_tempos || "1";
                document.getElementById('inConteudo').value = record?.conteudo || "";
                document.getElementById('inObs').value = record?.observacoes || "";

                const turmaNome = document.getElementById('selectTurma').options[document.getElementById('selectTurma').selectedIndex].text;
                const discNome = document.getElementById('selectDisc').options[document.getElementById('selectDisc').selectedIndex].text;
                document.getElementById('display-turma-disc').innerText = `${turmaNome} | ${discNome}`;
                document.getElementById('display-date').innerText = new Date(date + 'T12:00:00').toLocaleDateString('pt-BR', { weekday: 'long', day: 'numeric', month: 'long' });

                document.getElementById('content-form').classList.remove('hidden');
                document.getElementById('btnSave').classList.remove('hidden');

                // 2. Carrega Histórico da Disciplina na Turma
                await loadHistory(turmaId, discSigla);

            } catch (err) {
                console.error(err);
            } finally {
                document.getElementById('loading-overlay').classList.add('hidden');
                lucide.createIcons();
            }
        }

        async function loadHistory(turmaId, sigla) {
            const { data: history } = await window.supabaseClient.from('conteudos_aula')
                .select('*')
                .eq('id_turma', turmaId)
                .eq('sigla_disciplina', sigla)
                .order('data_aula', { ascending: false });

            currentHistory = history || [];
            renderHistory();
        }

        function renderHistory() {
            const list = document.getElementById('history-list');
            const sidebar = document.getElementById('history-sidebar');
            const countEl = document.getElementById('history-count');
            const currentDate = document.getElementById('selectDate').value;

            if (currentHistory.length === 0) {
                list.innerHTML = `<p class="text-xs text-slate-300 italic text-center py-10 uppercase tracking-widest">Nenhum registro anterior.</p>`;
            } else {
                list.innerHTML = currentHistory.map(item => {
                    const isActive = item.data_aula === currentDate;
                    return `
                        <div onclick="setDateAndLoad('${item.data_aula}')" class="history-item p-5 bg-white border border-slate-100 rounded-2xl shadow-sm ${isActive ? 'active' : ''}">
                            <div class="flex justify-between items-center mb-2">
                                <span class="text-[10px] font-black text-fmm-blue uppercase">${new Date(item.data_aula + 'T12:00:00').toLocaleDateString('pt-BR')}</span>
                                <span class="text-[9px] font-black text-slate-300 uppercase">${item.numero_tempos} Tempos</span>
                            </div>
                            <p class="text-xs font-medium text-slate-600 line-clamp-2 leading-relaxed">${item.conteudo}</p>
                        </div>
                    `;
                }).join('');
            }

            countEl.innerText = currentHistory.length;
            sidebar.classList.remove('hidden');
            lucide.createIcons();
        }

        function setDateAndLoad(date) {
            document.getElementById('selectDate').value = date;
            loadClassContent();
        }

        async function saveContent() {
            const turmaId = document.getElementById('selectTurma').value;
            const discSigla = document.getElementById('selectDisc').value;
            const date = document.getElementById('selectDate').value;
            const conteudo = document.getElementById('inConteudo').value.trim();

            if (!conteudo) return alert("Por favor, descreva o conteúdo da aula.");

            const btn = document.getElementById('btnSave');
            btn.disabled = true;
            btn.innerHTML = '<i data-lucide="refresh-cw" class="w-4 h-4 animate-spin"></i> Gravando...';
            lucide.createIcons();

            const payload = {
                id_turma: turmaId,
                sigla_disciplina: discSigla,
                data_aula: date,
                id_professor: currentUser.id,
                numero_tempos: parseInt(document.getElementById('inTempos').value),
                conteudo: conteudo,
                observacoes: document.getElementById('inObs').value.trim()
            };

            try {
                let error;
                if (currentRecordId) {
                    ({ error } = await window.supabaseClient.from('conteudos_aula').update(payload).eq('id', currentRecordId));
                } else {
                    ({ error } = await window.supabaseClient.from('conteudos_aula').insert([payload]));
                }

                if (error) throw error;
                showToast("Conteúdo salvo com sucesso!");
                await loadClassContent();
            } catch (err) {
                alert("Erro ao salvar: " + err.message);
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i data-lucide="save" class="w-4 h-4"></i> Salvar Registro';
                lucide.createIcons();
            }
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            document.getElementById('toast-msg').innerText = msg;
            t.classList.replace('opacity-0', 'opacity-100');
            t.classList.replace('translate-y-20', 'translate-y-0');
            setTimeout(() => {
                t.classList.replace('opacity-100', 'opacity-0');
                t.classList.replace('translate-y-0', 'translate-y-20');
            }, 3000);
        }

        window.onload = init;
    </script>
</body>
</html>
