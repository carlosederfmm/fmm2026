<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conteúdo de Aula | SME FMM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <script src="../assets/js/supabase_client.js"></script>
    <script src="../sidebar.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        fmm: {
                            dark: '#003c5b',
                            blue: '#00638f',
                            green: '#80a51b',
                            lime: '#c8d400',
                            bg: '#f1f5f9'
                        }
                    }
                }
            }
        }
    </script>

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; overflow: hidden; }
        .sidebar-transition { transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        
        .top-bar-select { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 12px; padding: 8px 12px; font-size: 12px; font-weight: 700; color: #003c5b; outline: none; transition: all 0.2s; min-width: 160px; }
        .top-bar-select:focus { border-color: #00638f; background: white; box-shadow: 0 0 0 4px rgba(0, 99, 143, 0.05); }

        .history-card { background: white; border-radius: 24px; border: 1px solid #f1f5f9; transition: all 0.3s ease; cursor: pointer; }
        .history-card:hover { transform: translateY(-4px); border-color: #c8d400; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05); }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade { animation: fadeIn 0.3s ease-out forwards; }

        .modal-overlay { background-color: rgba(0, 60, 91, 0.8); backdrop-filter: blur(4px); }
    </style>
</head>
<body class="flex h-screen w-screen overflow-hidden text-left">

    <aside id="sidebar-container" class="sidebar-transition w-72 bg-fmm-dark text-white flex-shrink-0 flex flex-col shadow-2xl relative z-20"></aside>

    <main class="flex-1 flex flex-col min-w-0 overflow-hidden">
        
        <header class="bg-white h-20 border-b flex items-center justify-between px-8 z-30 shadow-sm flex-shrink-0">
            <div class="flex items-center gap-6">
                <div class="flex flex-col text-left">
                    <h1 class="text-base font-black text-fmm-dark tracking-tight flex items-center gap-2 leading-none">
                        <span class="w-1.5 h-4 bg-fmm-lime rounded-full"></span>
                        Conteúdo de Aula
                    </h1>
                </div>

                <div class="h-8 w-px bg-slate-100 hidden md:block"></div>

                <div class="flex items-center gap-3">
                    <select id="selectTurma" onchange="handleTurmaChange()" class="top-bar-select">
                        <option value="">Selecione a Turma...</option>
                    </select>
                    <select id="selectDisc" onchange="loadHistory()" class="top-bar-select">
                        <option value="">Selecione a Disciplina...</option>
                    </select>
                </div>
            </div>

            <div class="flex items-center gap-4">
                <div id="sync-status" class="hidden items-center gap-2 px-3 py-1.5 bg-fmm-blue/5 rounded-full border border-fmm-blue/10 animate-pulse">
                    <i data-lucide="refresh-ccw" class="w-3.5 h-3.5 text-fmm-blue"></i>
                    <span class="text-[9px] font-black text-fmm-blue uppercase">Sinc...</span>
                </div>
                <button onclick="openModal()" id="btnAdd" class="hidden px-6 py-2.5 bg-fmm-dark text-white rounded-xl text-[10px] font-black uppercase tracking-widest hover:bg-slate-800 transition-all flex items-center gap-2 shadow-lg">
                    <i data-lucide="plus-circle" class="w-4 h-4"></i> Adicionar Registro
                </button>
            </div>
        </header>

        <!-- ÁREA DE HISTÓRICO (VISÃO PRINCIPAL) -->
        <div class="flex-1 overflow-y-auto custom-scrollbar bg-slate-50 p-8">
            <div id="loading-overlay" class="hidden h-full flex flex-col items-center justify-center text-slate-300 gap-4">
                <i data-lucide="loader-2" class="w-12 h-12 animate-spin text-fmm-blue"></i>
                <p class="text-sm font-bold uppercase tracking-widest">Buscando histórico...</p>
            </div>

            <div id="empty-view" class="h-full flex flex-col items-center justify-center text-center">
                <div class="w-20 h-20 bg-white rounded-full shadow-xl flex items-center justify-center mb-6 border border-slate-100">
                    <i data-lucide="history" class="w-10 h-10 text-slate-200"></i>
                </div>
                <h3 class="text-lg font-bold text-slate-400 uppercase tracking-tight">Selecione os filtros acima</h3>
                <p class="text-sm text-slate-300 italic font-medium">O histórico de registros aparecerá aqui.</p>
            </div>

            <div id="history-container" class="hidden max-w-6xl mx-auto">
                <div class="flex items-center justify-between mb-8">
                    <h2 class="text-xs font-black text-slate-400 uppercase tracking-[0.2em] flex items-center gap-2">
                        <i data-lucide="calendar-days" class="w-4 h-4 text-fmm-blue"></i> 
                        Cronograma de Aulas Registradas
                    </h2>
                    <span id="history-count" class="px-3 py-1 bg-white border border-slate-200 rounded-lg text-[10px] font-black text-fmm-dark shadow-sm">0 REGISTROS</span>
                </div>
                
                <div id="history-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 animate-fade">
                    <!-- Cards gerados via JS -->
                </div>
            </div>
        </div>
    </main>

    <!-- MODAL DE LANÇAMENTO / EDIÇÃO -->
    <div id="contentModal" class="hidden fixed inset-0 z-[100] modal-overlay flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-2xl rounded-[40px] shadow-2xl overflow-hidden animate-fade flex flex-col max-h-[90vh]">
            <div class="p-8 border-b border-slate-100 flex justify-between items-center bg-white shrink-0">
                <div class="flex flex-col text-left">
                    <h2 class="text-xl font-black text-fmm-dark uppercase tracking-tight leading-none" id="modalTitle">Registrar Aula</h2>
                    <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest mt-2" id="modalSubtitle">Preencha os detalhes da aula ministrada</p>
                </div>
                <button onclick="closeModal()" class="w-10 h-10 flex items-center justify-center hover:bg-slate-100 rounded-full transition-all text-slate-400"><i data-lucide="x" class="w-6 h-6"></i></button>
            </div>

            <div class="flex-1 overflow-y-auto p-8 space-y-6 custom-scrollbar">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="space-y-1.5 text-left">
                        <label class="text-[10px] font-black text-slate-400 uppercase ml-1">Data da Aula</label>
                        <input type="date" id="inDate" class="w-full px-5 py-3 bg-slate-50 border border-slate-200 rounded-2xl text-sm font-bold text-slate-700 outline-none focus:ring-2 focus:ring-fmm-blue">
                    </div>
                    <div class="space-y-1.5 text-left">
                        <label class="text-[10px] font-black text-slate-400 uppercase ml-1">Número de Tempos</label>
                        <select id="inTempos" class="w-full px-5 py-3 bg-slate-50 border border-slate-200 rounded-2xl text-sm font-bold text-slate-700 outline-none focus:ring-2 focus:ring-fmm-blue">
                            <option value="1">1 Tempo</option>
                            <option value="2">2 Tempos</option>
                            <option value="3">3 Tempos</option>
                            <option value="4">4 Tempos</option>
                            <option value="5">5 Tempos</option>
                        </select>
                    </div>
                </div>

                <div class="space-y-1.5 text-left">
                    <label class="text-[10px] font-black text-slate-400 uppercase ml-1">Conteúdo Ministrado</label>
                    <textarea id="inConteudo" rows="6" class="w-full p-6 bg-slate-50 border border-slate-200 rounded-3xl text-sm font-medium text-slate-700 outline-none focus:ring-4 focus:ring-fmm-blue/5 focus:bg-white transition-all" placeholder="O que foi trabalhado hoje?"></textarea>
                </div>

                <div class="space-y-1.5 text-left">
                    <label class="text-[10px] font-black text-slate-400 uppercase ml-1">Observações Pedagógicas (Opcional)</label>
                    <textarea id="inObs" rows="3" class="w-full p-6 bg-slate-50 border border-slate-200 rounded-3xl text-sm font-medium text-slate-700 outline-none focus:ring-4 focus:ring-fmm-blue/5 focus:bg-white transition-all" placeholder="Anotações extras..."></textarea>
                </div>
            </div>

            <div class="p-8 border-t border-slate-100 bg-slate-50/50 flex justify-end gap-3 shrink-0">
                <button id="btnDelete" onclick="deleteRecord()" class="hidden px-6 py-3 text-xs font-black text-red-500 uppercase rounded-2xl hover:bg-red-50 transition-all mr-auto">Excluir Registro</button>
                <button onclick="closeModal()" class="px-8 py-3.5 text-xs font-black text-slate-400 uppercase rounded-2xl hover:bg-white transition-all">Cancelar</button>
                <button onclick="saveContent()" id="btnSubmit" class="px-10 py-3.5 bg-fmm-dark text-white text-xs font-black uppercase rounded-2xl shadow-xl shadow-fmm-dark/20 hover:scale-105 active:scale-95 transition-all">Salvar Registro</button>
            </div>
        </div>
    </div>

    <!-- TOAST -->
    <div id="toast" class="fixed bottom-8 right-8 z-50 translate-y-20 opacity-0 transition-all duration-500">
        <div class="bg-slate-900 text-white px-8 py-5 rounded-2xl shadow-2xl flex items-center gap-4">
            <i data-lucide="check-circle" class="w-5 h-5 text-fmm-lime"></i>
            <span class="text-xs font-bold tracking-tight" id="toast-msg">Sincronizado</span>
        </div>
    </div>

    <script>
        let currentUser = null;
        let currentRecordId = null;
        let globalGrade = [];
        let teachesProjetoDeVida = false;
        let currentHistory = [];

        async function init() {
            if(window.SidebarComponent) await SidebarComponent.render('sidebar-container');
            const { data: { user } } = await window.supabaseClient.auth.getUser();
            if (!user) return window.location.href = '../index.html';
            const { data: profile } = await window.supabaseClient.from('perfis').select('*').eq('id', user.id).single();
            currentUser = profile;

            await populateSelectors();
            lucide.createIcons();
        }

        async function populateSelectors() {
            const selectT = document.getElementById('selectTurma');
            const selectD = document.getElementById('selectDisc');
            let turmas = [];

            if (currentUser.cargo === 'coordenador' || currentUser.cargo === 'diretor') {
                const { data: t } = await window.supabaseClient.from('turmas').select('*').order('nome');
                turmas = t || [];
            } else {
                const { data: pvidaCheck } = await window.supabaseClient.from('professor_disciplinas')
                    .select('sigla_disciplina')
                    .eq('id_professor', currentUser.id)
                    .eq('sigla_disciplina', 'P.VIDA')
                    .maybeSingle();
                
                teachesProjetoDeVida = !!pvidaCheck;

                const { data: grade } = await window.supabaseClient.from('grade_horaria')
                    .select('id_turma, turmas(*)')
                    .eq('id_professor', currentUser.id);
                
                globalGrade = grade || [];

                if (teachesProjetoDeVida) {
                    const { data: allAllowedTurmas } = await window.supabaseClient.from('turmas')
                        .select('*')
                        .in('nivel', currentUser.niveis_acesso || [])
                        .order('nome');
                    turmas = allAllowedTurmas || [];
                } else {
                    turmas = Array.from(new Map(globalGrade.map(g => [g.id_turma, g.turmas])).values()).filter(t => t !== null);
                }
                
                turmas.sort((a, b) => a.nome.localeCompare(b.nome, undefined, { numeric: true }));
            }

            selectT.innerHTML = '<option value="">Turma...</option>' + turmas.map(t => `<option value="${t.id}">${t.nome} (${t.serie})</option>`).join('');
            selectD.innerHTML = '<option value="">Disciplina...</option>'; 
        }

        function handleTurmaChange() {
            const turmaId = document.getElementById('selectTurma').value;
            const selectD = document.getElementById('selectDisc');

            if (currentUser.cargo === 'coordenador' || currentUser.cargo === 'diretor') {
                 loadAllDisciplines();
            } else {
                if (!turmaId) {
                    selectD.innerHTML = '<option value="">Disciplina...</option>';
                } else {
                    const { data: gradeForTurma } = window.supabaseClient.from('grade_horaria')
                        .select('sigla_disciplina, disciplinas(*)')
                        .eq('id_turma', turmaId)
                        .eq('id_professor', currentUser.id);
                    
                    const discFromGrade = globalGrade.filter(g => g.id_turma === turmaId).map(g => g.disciplinas).filter(d => d !== null);
                    const uniqueDiscMap = new Map(discFromGrade.map(d => [d.sigla, d]));

                    if (teachesProjetoDeVida) uniqueDiscMap.set('P.VIDA', { sigla: 'P.VIDA', nome: 'PROJETO DE VIDA' });

                    const sortedDisc = Array.from(uniqueDiscMap.values()).sort((a, b) => a.nome.localeCompare(b.nome));
                    selectD.innerHTML = '<option value="">Disciplina...</option>' + sortedDisc.map(d => `<option value="${d.sigla}">${d.nome} (${d.sigla})</option>`).join('');
                }
            }
            loadHistory();
        }

        async function loadAllDisciplines() {
            const { data } = await window.supabaseClient.from('disciplinas').select('*').order('nome');
            document.getElementById('selectDisc').innerHTML = '<option value="">Disciplina...</option>' + data.map(d => `<option value="${d.sigla}">${d.nome} (${d.sigla})</option>`).join('');
        }

        async function loadHistory() {
            const turmaId = document.getElementById('selectTurma').value;
            const sigla = document.getElementById('selectDisc').value;
            const grid = document.getElementById('history-grid');
            const empty = document.getElementById('empty-view');
            const container = document.getElementById('history-container');
            const btnAdd = document.getElementById('btnAdd');

            if (!turmaId || !sigla) {
                container.classList.add('hidden');
                empty.classList.remove('hidden');
                btnAdd.classList.add('hidden');
                return;
            }

            empty.classList.add('hidden');
            document.getElementById('loading-overlay').classList.remove('hidden');
            container.classList.add('hidden');

            try {
                const { data: history } = await window.supabaseClient.from('conteudos_aula')
                    .select('*, prof:perfis(nome_completo)')
                    .eq('id_turma', turmaId)
                    .eq('sigla_disciplina', sigla)
                    .order('data_aula', { ascending: false });

                currentHistory = history || [];
                document.getElementById('history-count').innerText = `${currentHistory.length} REGISTROS`;

                if (currentHistory.length === 0) {
                    grid.innerHTML = '';
                    // Se não houver nada, apenas mostra o botão de adicionar
                } else {
                    grid.innerHTML = currentHistory.map(item => `
                        <div onclick="openModal('${item.id}')" class="history-card p-6 flex flex-col gap-4 animate-fade">
                            <div class="flex justify-between items-start">
                                <div class="bg-fmm-blue/5 p-2 rounded-xl text-fmm-blue">
                                    <i data-lucide="book-open" class="w-5 h-5"></i>
                                </div>
                                <span class="text-[10px] font-black text-slate-300 uppercase">${new Date(item.data_aula + 'T12:00:00').toLocaleDateString('pt-BR')}</span>
                            </div>
                            <div class="flex-1">
                                <p class="text-xs font-black text-fmm-dark uppercase mb-2 line-clamp-1">${item.numero_tempos} Tempos de Aula</p>
                                <p class="text-xs font-medium text-slate-500 line-clamp-3 leading-relaxed">${item.conteudo}</p>
                            </div>
                            <div class="pt-4 border-t border-slate-50 flex items-center justify-between">
                                <div class="flex items-center gap-2">
                                    <div class="w-6 h-6 rounded-full bg-slate-100 flex items-center justify-center text-[8px] font-black text-slate-400">
                                        ${item.prof?.nome_completo?.charAt(0) || 'P'}
                                    </div>
                                    <span class="text-[9px] font-bold text-slate-400 uppercase">${item.prof?.nome_completo?.split(' ')[0] || 'Docente'}</span>
                                </div>
                                <i data-lucide="chevron-right" class="w-4 h-4 text-slate-200"></i>
                            </div>
                        </div>
                    `).join('');
                }

                container.classList.remove('hidden');
                btnAdd.classList.remove('hidden');
                lucide.createIcons();
            } catch (err) {
                console.error(err);
            } finally {
                document.getElementById('loading-overlay').classList.add('hidden');
            }
        }

        function openModal(id = null) {
            currentRecordId = id;
            const form = document.getElementById('contentModal');
            const btnDel = document.getElementById('btnDelete');
            
            if (id) {
                const record = currentHistory.find(r => r.id === id);
                document.getElementById('modalTitle').innerText = "Editar Registro";
                document.getElementById('inDate').value = record.data_aula;
                document.getElementById('inTempos').value = record.numero_tempos;
                document.getElementById('inConteudo').value = record.conteudo;
                document.getElementById('inObs').value = record.observacoes || "";
                btnDel.classList.remove('hidden');
            } else {
                document.getElementById('modalTitle').innerText = "Novo Registro";
                document.getElementById('inDate').valueAsDate = new Date();
                document.getElementById('inTempos').value = "1";
                document.getElementById('inConteudo').value = "";
                document.getElementById('inObs').value = "";
                btnDel.classList.add('hidden');
            }

            form.classList.remove('hidden');
            lucide.createIcons();
        }

        function closeModal() { document.getElementById('contentModal').classList.add('hidden'); }

        async function saveContent() {
            const turmaId = document.getElementById('selectTurma').value;
            const discSigla = document.getElementById('selectDisc').value;
            const date = document.getElementById('inDate').value;
            const conteudo = document.getElementById('inConteudo').value.trim();

            if (!conteudo) return alert("Por favor, descreva o conteúdo da aula.");

            const btn = document.getElementById('btnSubmit');
            btn.disabled = true;
            btn.innerText = "Salvando...";

            const payload = {
                id_turma: turmaId,
                sigla_disciplina: discSigla,
                data_aula: date,
                id_professor: currentUser.id,
                numero_tempos: parseInt(document.getElementById('inTempos').value),
                conteudo: conteudo,
                observacoes: document.getElementById('inObs').value.trim()
            };

            try {
                let error;
                if (currentRecordId) {
                    ({ error } = await window.supabaseClient.from('conteudos_aula').update(payload).eq('id', currentRecordId));
                } else {
                    ({ error } = await window.supabaseClient.from('conteudos_aula').insert([payload]));
                }

                if (error) throw error;
                showToast("Conteúdo salvo!");
                closeModal();
                await loadHistory();
            } catch (err) {
                alert("Erro ao salvar: " + err.message);
            } finally {
                btn.disabled = false;
                btn.innerText = "Salvar Registro";
            }
        }

        async function deleteRecord() {
            if (!confirm("Deseja excluir este registro permanentemente?")) return;
            try {
                const { error } = await window.supabaseClient.from('conteudos_aula').delete().eq('id', currentRecordId);
                if (error) throw error;
                showToast("Registro removido.");
                closeModal();
                await loadHistory();
            } catch (err) { alert(err.message); }
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            document.getElementById('toast-msg').innerText = msg;
            t.classList.replace('opacity-0', 'opacity-100');
            t.classList.replace('translate-y-20', 'translate-y-0');
            setTimeout(() => {
                t.classList.replace('opacity-100', 'opacity-0');
                t.classList.replace('translate-y-0', 'translate-y-20');
            }, 3000);
        }

        window.onload = init;
    </script>
</body>
</html>
